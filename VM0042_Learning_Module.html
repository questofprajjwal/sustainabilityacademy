<h2 class="text-2xl font-bold text-gray-800 mb-4">The Greenhouse Effect & Three Gases That Matter</h2>

<div class="highlight-box p-4 rounded mb-6">
  <p class="font-semibold text-green-800">Why this matters for VM0042</p>
  <p class="text-green-900 mt-1">VM0042 requires you to measure and account for three greenhouse gases: <strong>CO₂, CH₄, and N₂O</strong>. Understanding why each matters — and how to compare them — is the foundation of everything else.</p>
</div>

<h3 class="text-xl font-bold mt-6 mb-3">What Are Greenhouse Gases?</h3>
<p class="mb-4">Greenhouse gases (GHGs) trap heat in the Earth's atmosphere. Like a blanket around the planet, they prevent heat from escaping into space. The more GHGs, the warmer it gets.</p>

<div class="analogy-box p-4 rounded mb-6">
  <p class="font-semibold text-blue-800">🎯 Analogy: Three Blankets</p>
  <ul class="mt-2 space-y-2 text-blue-900">
    <li><strong>CO₂</strong> is a thin cotton sheet — it's abundant and lasts 300–1,000 years in the atmosphere.</li>
    <li><strong>CH₄ (methane)</strong> is a wool blanket — 28× warmer than CO₂ per molecule, but only lasts ~12 years.</li>
    <li><strong>N₂O (nitrous oxide)</strong> is a heavy duvet — 265× warmer than CO₂ per molecule and lasts over 100 years.</li>
  </ul>
</div>

<h3 class="text-xl font-bold mt-6 mb-3">Global Warming Potential (GWP)</h3>
<p class="mb-4">Because each gas has a different warming power and atmospheric lifetime, scientists use <strong>Global Warming Potential (GWP)</strong> to compare them. GWP expresses everything in <em>tonnes of CO₂-equivalent (CO₂e)</em>.</p>

<table class="mb-6">
  <tr><th>Gas</th><th>GWP (AR5, 100-year)</th><th>Main Agricultural Source</th></tr>
  <tr><td>CO₂</td><td>1</td><td>Soil decomposition, fossil fuel, liming</td></tr>
  <tr><td>CH₄</td><td>28</td><td>Rice paddies, livestock (enteric fermentation)</td></tr>
  <tr><td>N₂O</td><td>265</td><td>Nitrogen fertilizers, manure</td></tr>
</table>

<div class="example-box p-4 rounded mb-6">
  <p class="font-semibold text-amber-800">📐 Worked Example: Converting to CO₂e</p>
  <p class="mt-2">A rice paddy emits <strong>10 tonnes of CH₄</strong> per year.<br>
  CO₂e = 10 × 28 = <strong>280 tonnes CO₂e/year</strong></p>
  <p class="mt-2">A wheat field emits <strong>2 tonnes of N₂O</strong> per year from fertilizer.<br>
  CO₂e = 2 × 265 = <strong>530 tonnes CO₂e/year</strong></p>
  <p class="mt-2 text-amber-700 text-sm">Note: These are converted to CO₂e so they can be added together in the total GHG budget.</p>
</div>

<h3 class="text-xl font-bold mt-6 mb-3">Agriculture's Share of Global Emissions</h3>
<p class="mb-4">Agriculture contributes roughly <strong>10–12% of global GHG emissions</strong> directly (and more when land use change is included). The three gases in VM0042 together account for most of that:</p>
<ul class="list-disc ml-6 space-y-2 mb-4">
  <li>CO₂ from soil disturbance (tillage, land conversion)</li>
  <li>CH₄ from rice paddies and livestock</li>
  <li>N₂O from nitrogen fertilizers and manure</li>
</ul>

<div class="bg-green-50 border border-green-200 rounded p-4">

<h2 class="text-2xl font-bold text-gray-800 mb-4">Soil as a Carbon Bank</h2>

<div class="highlight-box p-4 rounded mb-6">
  <p class="font-semibold text-green-800">The core concept of VM0042</p>

<div class="analogy-box p-4 rounded mb-6">

    <li><strong>Deposits (inputs):</strong> Plant roots dying, crop residues decomposing, compost, manure</li>

    <li><strong>Balance:</strong> SOC stock — measured in tonnes of carbon per hectare (tC/ha)</li>
  </ul>

<h3 class="text-xl font-bold mt-6 mb-3">What Is Soil Organic Carbon (SOC)?</h3>
<p class="mb-4">SOC is carbon stored in soil organic matter — decomposed plant residues, root material, microbial biomass, and humus. It's different from inorganic carbon (like limestone) and from CO₂ in soil air.</p>

<table class="mb-6">
  <tr><th>SOC Stock (typical)</th><th>Farming System</th></tr>
  <tr><td>40–80 tC/ha</td><td>Native grassland or forest (high SOC)</td></tr>

  <tr><td>10–20 tC/ha</td><td>Degraded / conventionally tilled cropland</td></tr>
</table>

<h3 class="text-xl font-bold mt-6 mb-3">How Does SOC Get into Soil?</h3>
<ul class="list-disc ml-6 space-y-2 mb-4">
  <li><strong>Crop roots:</strong> When roots die, carbon stays in soil. Deep-rooted crops (like cover crops or grasses) deposit more carbon.</li>
  <li><strong>Crop residues:</strong> Leaving stubble on the field lets microbes decompose it, adding carbon to the soil.</li>
  <li><strong>Compost & manure:</strong> Organic amendments directly add carbon.</li>
  <li><strong>Reduced tillage:</strong> Tillage breaks up soil aggregates, exposing previously protected organic matter to rapid decomposition — releasing CO₂. Less tillage = less loss.</li>
</ul>

<div class="example-box p-4 rounded mb-6">
  <p class="font-semibold text-amber-800">📐 Real-World Numbers</p>
  <p class="mt-2">A 1,000 ha farm switches from conventional tillage to no-till + cover crops. Over 5 years:</p>
  <ul class="mt-2 space-y-1">
    <li>SOC increases from <strong>25 tC/ha → 27 tC/ha</strong></li>
    <li>Change: +2 tC/ha × 1,000 ha = <strong>2,000 tC total</strong></li>
    <li>Converting C to CO₂: × (44/12) = <strong>7,333 tCO₂ removed from atmosphere</strong></li>
    <li>= approximately <strong>7,333 potential carbon credits</strong></li>
  </ul>
</div>

<h3 class="text-xl font-bold mt-6 mb-3">Why SOC Matters Beyond Carbon</h3>
<p class="mb-4">Higher SOC improves soil health in multiple ways — this is why "regenerative agriculture" and carbon credits often go hand in hand:</p>
<ul class="list-disc ml-6 space-y-2 mb-4">
  <li>Better water-holding capacity (drought resilience)</li>
  <li>Improved soil structure (less compaction)</li>
  <li>Higher nutrient availability (reduced fertilizer need)</li>
  <li>Greater biodiversity of soil organisms</li>
</ul>

<div class="bg-amber-50 border border-amber-300 rounded-lg p-4 mb-4">
  <h4 class="font-semibold text-amber-800 mb-2">Important: Soil Carbon Saturation (Equilibrium)</h4>
  <p class="text-amber-900 text-sm">Soils do not accumulate carbon indefinitely. Each soil has a <strong>saturation capacity</strong> — a maximum SOC level determined by clay content, mineralogy, climate, and organic matter inputs. As improved practices are applied, SOC accumulates quickly at first, then slows, and eventually reaches a new steady-state equilibrium (typically within 20–40 years).</p>
  <p class="text-amber-900 text-sm mt-2"><strong>Why this matters for VM0042 projects:</strong></p>

    <li>VM0042 projects with high-clay soils in wet climates have higher saturation capacity (more potential); degraded sandy soils in dry climates approach saturation faster</li>
  </ul>
</div>
<div class="bg-green-50 border border-green-200 rounded p-4">
  <p class="font-semibold text-green-800">Key Takeaway</p>
  <p class="text-green-900 mt-1">SOC stock is measured in <strong>tonnes of carbon per hectare (tC/ha)</strong>. To convert to CO₂e, multiply by <strong>44/12 ≈ 3.67</strong>. VM0042 requires measuring SOC at the start of the project and periodically throughout to track changes. Remember: soil carbon accumulation tapers toward an equilibrium — it does not compound forever.</p>
</div>

<h3 class="text-xl font-bold mt-6 mb-3">Grouped Projects: Additionality for Aggregated Smallholders</h3>
<p class="text-sm mb-3">Most ALM projects aggregate hundreds or thousands of smallholder farmers under a single project. Under the VCS Standard's <strong>grouped project</strong> framework, additionality is assessed for the initial project activity instances (the farmers enrolled at project start). New farmers can be added later within a defined geographic boundary without re-demonstrating additionality — provided the project proponent can show they meet the same eligibility criteria as the initial instances.</p>

<h3 class="text-xl font-bold mt-6 mb-3">Double Claiming and Scope 3 / Supply Chain Insetting</h3>
<p class="text-sm mb-3">A significant commercial complexity arises at the intersection of carbon offsets and corporate supply chains. If a food company's supplier farms are enrolled in a VM0042 project:</p>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4 text-sm">

    <p>The food company claims the carbon benefit within its own supply chain (Scope 3 emissions). The VCUs are retired against the company's own footprint. The company cannot <em>also</em> sell those VCUs to a third-party buyer — and the farmer cannot claim the benefit either. This is called <strong>insetting</strong>.</p>
  </div>
  <div class="bg-purple-50 p-4 rounded-lg border border-purple-200">
    <h4 class="font-semibold text-purple-800 mb-2">Third-Party Offsets</h4>

  </div>
</div>
<div class="bg-yellow-50 border border-yellow-300 rounded-lg p-4 mb-4">
  <h4 class="font-semibold text-yellow-800 mb-1">Why This Matters: Double-Counting Risk</h4>
  <p class="text-sm text-yellow-900">If a food company claims Scope 3 reductions from its supplier farms AND those same farms sell VCUs to a third party, the same carbon benefit would be counted twice — once in the supply chain and once in the carbon market. Verra requires clear contractual arrangements specifying who holds the rights to the carbon benefit before VCUs are issued. Project developers must resolve this question with their commercial partners before project registration.</p>
</div>

<h2 class="text-2xl font-bold text-gray-800 mb-4">Measuring SOC in the Field</h2>
<div class="highlight-box p-4 rounded mb-6">
  <p class="font-semibold text-green-800">The physical heart of VM0042</p>
  <p class="text-green-900 mt-1">Whether you use Approach 1 or 2, measuring SOC stocks accurately is fundamental to your project's credibility and credit count. This lesson explains how it's done — from sampling design to the lab to the final calculation.</p>

<h3 class="text-xl font-bold mt-6 mb-3">SOC Stock Formula</h3>
<div class="formula-box p-4 mb-6">
  <p class="font-mono text-sm">SOC stock (tC/ha) = OC concentration (g/kg) × Bulk density (g/cm³) × Depth (cm) × 0.1</p>
  <p class="text-gray-400 text-xs mt-2">Or equivalently: SOC% × BD (g/cm³) × depth (cm) × 100 = tC/ha</p>
</div>
<table class="mb-6">

  <tr><td><strong>OC concentration</strong></td><td>% carbon in the dry soil</td><td>Lab analysis (dry combustion / Dumas method preferred)</td></tr>
  <tr><td><strong>Bulk density (BD)</strong></td><td>Mass of dry soil per unit volume (g/cm³)</td><td>Core, excavation, or clod method in field; oven-dry in lab</td></tr>
  <tr><td><strong>Depth</strong></td><td>Soil layer being measured</td><td>Minimum 30 cm; 50 cm recommended</td></tr>
</table>

<div class="example-box p-4 rounded mb-6">
  <p class="font-semibold text-amber-800">📐 Worked Example: Calculating SOC Stock</p>
  <p class="mt-2 text-sm">A soil core from a 0–30 cm layer:</p>
  <ul class="mt-2 text-sm space-y-1">
    <li>OC concentration = 1.8% = 18 g/kg</li>
    <li>Bulk density = 1.35 g/cm³</li>

  </div>

</div>

<h3 class="text-xl font-bold mt-6 mb-3">Sampling Design: Stratified Random Sampling</h3>
<p class="mb-3 text-sm">VM0042 requires <strong>stratified random sampling</strong>. Each quantification unit must be divided into strata based on factors that influence SOC distribution (soil texture, slope, historical land use, management history).</p>

<div class="analogy-box p-4 rounded mb-4">

  <p class="mt-1 text-sm text-blue-900">Imagine comparing the sugar content of two cakes: a fluffy cake (low density) and a dense cake. If you take a 3-cm slice from each, the dense cake has more sugar simply because there's more cake in that slice — not because it's sweeter. <strong>ESM</strong> is like saying "compare equal weights of cake" instead of "equal thicknesses." In soil terms, compare the same mass of soil, not the same depth — to avoid bias from bulk density changes over time.</p>
</div>
<p class="text-sm mb-3">When no-till is adopted, surface soil bulk density often increases slightly. If you compare SOC to 30 cm depth in both baseline and project, you're comparing different soil masses — unfair comparison. ESM corrects for this.</p>
<p class="text-sm mb-4 font-medium">VM0042 requires SOC stock changes to be reported on an Equivalent Soil Mass (ESM) basis.</p>

<p class="text-sm mb-3">The ESM method works by choosing a <strong>reference soil mass</strong> (usually the baseline soil mass to a standard depth) and then computing how thick a layer you'd need to sample in the project scenario to capture that exact same mass of soil.</p>

  <p class="font-mono text-sm">D<sub>ESM</sub> = M<sub>ref</sub> / (BD<sub>project</sub> × 10,000)</p>
  <p class="text-gray-300 text-xs mt-3 mb-2">ESM-corrected SOC stock (project):</p>
  <p class="font-mono text-sm">SOC<sub>ESM</sub> = OC<sub>project</sub>% × BD<sub>project</sub> × D<sub>ESM</sub> × 10,000</p>
  <p class="text-gray-400 text-xs mt-2">Units: BD in g/cm³; depth in cm; SOC stock in tC/ha</p>
</div>
<div class="example-box p-4 rounded mb-4">

  <p class="mt-1 text-sm text-blue-900">Leakage is like squeezing a balloon — if you push it in on one side, it bulges out somewhere else. A truly good carbon project reduces the total size of the balloon (total global emissions), not just reshapes it. VM0042 requires you to check for and quantify all four types of "bulging."</p>
</div>

<h3 class="text-xl font-bold mt-6 mb-3">Method 1: Analytical Error Propagation</h3>
<p class="text-sm mb-3">When combining multiple independent measurements, error propagation rules determine how individual uncertainties combine into a total uncertainty.</p>

<div class="bg-gray-50 border rounded p-4 mb-4">

<h2 class="text-2xl font-bold text-gray-800 mb-4">VCU Lifecycle: After First Issuance</h2>
<div class="highlight-box p-4 rounded mb-6">
  <p class="font-semibold text-green-800">A VCU doesn't end at issuance</p>
  <p class="text-green-900 mt-1">Once VCUs are deposited into a registry account, they have a defined lifecycle — they can be transferred, sold, labeled, retired, or cancelled. Meanwhile, the project must continue submitting verifications and maintaining its registry status. This lesson covers what happens to VCUs and to the project throughout its crediting life.</p>
</div>

<h3 class="text-xl font-bold mt-6 mb-3">Step 5: Periodic VCU Issuance — Repeat Crediting</h3>
<p class="text-sm mb-3">A registered project can continue issuing VCUs from subsequent monitoring periods throughout its crediting period (typically 20–30 years for VM0042). Each subsequent issuance follows the same core process as the first — submit monitoring report, verification report, and representations to Verra; Verra reviews; VCUs deposited after levy payment.</p>
<div class="bg-amber-50 border border-amber-200 rounded p-3 mb-4 text-sm">
  <p class="font-semibold text-amber-800">5-Year Maximum Verification Gap</p>
  <p class="mt-1 text-amber-900">The project proponent <strong>must</strong> submit a verification approval request within 5 years of the previous approval date. Missing this deadline triggers <strong>"late to verify"</strong> status on the registry — a public signal that the project has not been recently audited. Projects with "late to verify" status can still submit and recover, but investors and buyers treat this as a quality signal.</p>
</div>

<h3 class="text-xl font-bold mt-6 mb-3">Step 6: VCU Retirement vs. Cancellation — A Critical Distinction</h3>
<div class="analogy-box p-4 rounded mb-4">
  <p class="font-semibold text-blue-800">🏷️ Analogy: Concert Ticket vs. Refund</p>
  <p class="mt-1 text-sm text-blue-900">Retiring a VCU is like using your concert ticket — the credit is permanently consumed to offset a tonne of emissions, with the retirement reason recorded publicly. Cancelling a VCU is like voiding a ticket without going to the concert — it's removed from circulation without making an offsetting claim, often for technical or regulatory reasons (e.g., converting VCUs into another program's credits).</p>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6 text-sm">
  <div class="bg-green-50 border border-green-200 rounded p-4">
    <h4 class="font-bold text-green-800 mb-2">Retirement</h4>
    <p class="text-green-900">Used when a buyer permanently claims the credit against their emissions (e.g., corporate net-zero claim, CORSIA compliance). The registry account holder initiates retirement through their Verra Registry account. The Verra Registry records all details — quantity, vintage, retirement reason, and the entity retiring.</p>
    <p class="mt-2 text-green-800"><strong>Who initiates:</strong> Registry account holder (owner of the VCU).</p>
    <p class="mt-1 text-green-700 text-xs">Incremental retirement is permitted — holder may retire part of their holdings now and the rest later.</p>
  </div>
  <div class="bg-orange-50 border border-orange-200 rounded p-4">
    <h4 class="font-bold text-orange-800 mb-2">Cancellation</h4>
    <p class="text-orange-900">Used when VCUs are being converted into another form of GHG credit, or when Verra cancels credits due to a reversal or compliance issue. Cancellation does NOT constitute an offset claim. The registry records all cancellation details.</p>
    <p class="mt-2 text-orange-800"><strong>Who initiates:</strong> Registry account holder, the other GHG program, or Verra (in some cases).</p>
    <p class="mt-1 text-orange-700 text-xs">Example: converting VCUs into ITMOs (Article 6 credits) for use in a compliance market requires cancellation + corresponding adjustment.</p>
  </div>
</div>

<h3 class="text-xl font-bold mt-6 mb-3">The AFOLU Pooled Buffer Account — Mechanics</h3>
<p class="text-sm mb-3">For AFOLU projects (including all VM0042 projects), a percentage of every VCU issuance is deposited as non-tradeable <strong>buffer credits</strong> into the centrally managed AFOLU Pooled Buffer Account. These are not VCUs — they have no serial numbers and cannot be sold or traded.</p>

<div class="grid grid-cols-1 md:grid-cols-3 gap-3 mb-4 text-sm">
  <div class="bg-blue-50 border border-blue-200 rounded p-3">
    <h5 class="font-bold text-blue-800 mb-1">Deposit</h5>
    <p class="text-blue-900 text-xs">At every VCU issuance, buffer credits = buffer % × net GHG removals. Buffer contributions are set separately for reductions (typically 0%) and removals (10–20%). The non-permanence risk tool determines the %. Buffer credits are deposited simultaneously with VCU issuance.</p>
  </div>
  <div class="bg-green-50 border border-green-200 rounded p-3">
    <h5 class="font-bold text-green-800 mb-1">Release (Earned Back)</h5>
    <p class="text-green-900 text-xs">Buffer credits can be <em>released</em> back as VCUs (into the project's account) if the project's non-permanence risk remains the same or decreases. Release conditions: first release ≥5 years after first verification; subsequent releases at most every 5 years. A <strong>15% time release</strong> applies to total accumulated buffer credits at each eligible release event.</p>
  </div>
  <div class="bg-red-50 border border-red-200 rounded p-3">
    <h5 class="font-bold text-red-800 mb-1">Cancellation (Loss Events)</h5>
    <p class="text-red-900 text-xs">If a reversal occurs (e.g., drought kills soil carbon), the project proponent must notify Verra within 30 days. Verra puts buffer credits on hold equal to the estimated loss. Upon verification confirming the loss, an equivalent number of buffer credits are cancelled — covering the reversal without impacting VCU holders. The project cannot issue new VCUs until a loss event report is submitted.</p>
  </div>
</div>

<div class="example-box p-4 rounded mb-6 text-sm">
  <p class="font-semibold text-amber-800">📐 Buffer Pool Worked Example — 10-year project</p>
  <table class="mt-2">
    <tr><th>Event</th><th>Buffer Credits</th><th>VCUs Issued</th></tr>
    <tr><td>Year 5 — First verification (100,000 tCO₂e removals, 15% buffer rate)</td><td>+15,000 deposited to pool</td><td>85,000 VCUs</td></tr>
    <tr><td>Year 10 — Second verification (80,000 tCO₂e, risk same → 15% time release eligible)</td><td>+12,000 deposited; 15% × 27,000 total = 4,050 released as VCUs</td><td>68,000 + 4,050 = 72,050</td></tr>
    <tr><td>Year 8 drought event (carbon loss estimated 5,000 tCO₂e)</td><td>5,000 buffer credits cancelled from pool</td><td>No new VCUs until loss report filed</td></tr>
  </table>
</div>

<h3 class="text-xl font-bold mt-6 mb-3">The 9 VCU Attributes — What Makes a VCU Credible?</h3>
<p class="text-sm mb-3">The VCS Program Guide (Section 3) establishes 9 attributes that every VCU must embody. These are the quality standards that underpin the entire VCS system:</p>
<table class="mb-4 text-sm">
  <tr><th>Attribute</th><th>What It Means for VM0042</th></tr>
  <tr><td><strong>Additional</strong></td><td>Reductions exceed what would happen without carbon market incentive (Lesson 2.3 — the additionality tests)</td></tr>
  <tr><td><strong>Durable</strong></td><td>Safeguards (buffer pool) are in place; reversals are accounted for, reported, and replaced where possible</td></tr>
  <tr><td><strong>Independently verified</strong></td><td>Accredited VVB with AFOLU sectoral scope approval audits the project</td></tr>
  <tr><td><strong>Traceable and not double counted</strong></td><td>Unique VCU serial numbers in the Verra Registry prevent double issuance, double claiming, and double use</td></tr>
  <tr><td><strong>Robustly quantified</strong></td><td>VM0042 equations, uncertainty deductions, and buffer pool ensure conservative measurement (Modules 3–4)</td></tr>
  <tr><td><strong>Participatory-based</strong></td><td>Stakeholder consultation, free prior and informed consent (FPIC), grievance mechanisms — required by VCS</td></tr>
  <tr><td><strong>Safeguarded from unmitigated harm</strong></td><td>Negative impacts on people/environment assessed and mitigated; Indigenous Peoples' rights upheld</td></tr>
  <tr><td><strong>Aligned with SDGs</strong></td><td>Project activities designed to deliver positive sustainable development outcomes</td></tr>
  <tr><td><strong>Aligned with net zero transition</strong></td><td>Activities must not lock in emissions or be incompatible with mid-century net zero</td></tr>
</table>

<h3 class="text-xl font-bold mt-6 mb-3">Step 7: Project Maintenance & Quality Control</h3>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4 text-sm">
  <div class="bg-gray-50 border border-gray-200 rounded p-3">
    <h5 class="font-bold text-gray-700 mb-1">Project Maintenance Obligations</h5>
    <ul class="space-y-1 text-gray-600 text-xs">
      <li>• Submit verification approval request every ≤5 years or become "late to verify"</li>
      <li>• Proponent may voluntarily withdraw the project via the Verra Project Hub (withdrawal form); already-verified credits are still issued before withdrawal</li>

<h2 class="text-2xl font-bold text-gray-800 mb-4">VT0008 Steps 3 & 4: Investment Analysis & Common Practice</h2>

<div class="highlight-box p-4 rounded mb-6">

<h3 class="text-xl font-bold mt-6 mb-3">Step 3: Investment Analysis — Two Options</h3>

<div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">

</div>

<h3 class="text-xl font-bold mt-6 mb-3">Calculating the Benchmark: WACC and Cost of Equity</h3>

<div class="formula-box p-4 mb-4">
  <p class="font-bold text-green-300 mb-2">WACC (for Project IRR benchmark)</p>
  <p class="font-mono text-lg text-yellow-200">WACC = r_e × W_e + r_d × (1 - T_c) × W_d</p>
  <div class="grid grid-cols-2 gap-x-4 mt-3 text-sm text-slate-300">
    <div>r_e = cost of equity (%)</div>
    <div>W_e = equity fraction (%)</div>
    <div>r_d = cost of debt (%)</div>

  <p class="mt-2 text-sm">A rice co-op in Vietnam's Mekong Delta adopts Alternate Wetting and Drying (AWD) under VM0042. Using Appendix 2 default values for Vietnam:</p>

<p class="mb-3 text-sm">VT0008 Appendix 2 requires a transparent Excel model published alongside the project description on the Verra website. Commercially sensitive information may be protected where justified under the VCS Standard. Key requirements:</p>
<ul class="list-disc ml-6 text-sm space-y-1 mb-4">
  <li>All formulas readable and all relevant cells viewable and unprotected (except where commercially sensitive — must be justified to Verra's satisfaction)</li>

<div class="bg-red-50 border border-red-200 rounded p-3 mb-6 text-sm">

  <ul class="mt-1 space-y-1 text-red-900">

    <li>• Using pre-tax cash flows with post-tax benchmark</li>
    <li>• Excluding unfavorable revenue assumptions from sensitivity analysis</li>
    <li>• Using a debt/equity split inconsistent with sector norms</li>
  </ul>
</div>

<h3 class="text-xl font-bold mt-6 mb-3">Step 4: Common Practice Analysis</h3>
<p class="mb-3">Even if Steps 2 or 3 are passed, additionality fails if the project activity has already become <strong>common practice</strong> — i.e., it has spread so widely in the applicable geographic area that carbon credits are no longer needed to drive adoption.</p>

<h2 class="text-2xl font-bold text-gray-800 mb-4">VMD0053: Bias Tests, Prediction Error & the Model Validation Report</h2>

<h3 class="text-xl font-bold mt-6 mb-3">The Bias Test (Section 5.2.4)</h3>
<p class="mb-3 text-sm">Bias is the systematic tendency of a model to overestimate or underestimate effects. Even a biased model can still be used — but large biases produce large prediction errors, which result in larger credit deductions.</p>

<div class="formula-box p-4 mb-4">

  <div class="grid grid-cols-2 gap-x-4 mt-3 text-sm text-slate-300">
    <div>P_i = predicted value for observation i (tCO₂e)</div>

    <div>i = index of current observation</div>
  </div>
  <p class="text-slate-300 text-sm mt-2">Mean bias = unweighted mean of all per-study biases <em>(unweighted so that one large study with many observations does not automatically dominate model acceptance)</em></p>

<div class="formula-box p-4 mb-6">

    <div>n_j = number of replicates in the j-th observation</div>
    <div>k = number of observations across all studies</div>
    <div></div>
  </div>
  <p class="text-slate-300 text-sm mt-2"><strong>Bias validity test:</strong> |mean bias| ≤ PMU → model PASSES the bias test</p>
</div>

<div class="example-box p-4 rounded mb-6">
  <p class="font-semibold text-amber-800">📐 Worked Bias Calculation (from VMD0053 Figure 5)</p>
  <p class="mt-2 text-sm">Three studies measuring the effect of reduced tillage on SOC change (values in tCO₂e):</p>
  <table class="text-sm mt-2">
    <tr><th>Study</th><th>Observations (modeled vs observed)</th><th>Per-study bias</th></tr>
    <tr><td>Study 1</td><td>(1.1 vs 4.5) and (12.2 vs 3.1)</td><td>((1.1−4.5) + (12.2−3.1)) / 2 = +2.85</td></tr>
    <tr><td>Study 2</td><td>(0.6 vs 1.2)</td><td>(0.6−1.2) / 1 = −0.60</td></tr>
    <tr><td>Study 3</td><td>(−3.3 vs 3.5) and (4.5 vs 4.0)</td><td>((−3.3−3.5) + (4.5−4.0)) / 2 = −3.15</td></tr>
  </table>
  <p class="font-mono text-sm bg-slate-100 p-2 rounded mt-2">Mean bias = (2.85 + (−0.60) + (−3.15)) / 3 = (−0.90) / 3 = −0.30</p>
  <p class="text-sm mt-2">PMU calculated from all study standard errors = <strong>1.6 tCO₂e</strong></p>
  <p class="text-sm font-bold text-amber-800 mt-1">Bias test: |−0.30| = 0.30 ≤ 1.6 (PMU) → Model PASSES bias test ✓</p>
</div>

<div class="bg-slate-50 border border-slate-200 rounded p-4 mb-6 text-sm">
  <p class="font-semibold text-slate-800">The Perverse Effect of Bias on Credits</p>
  <p class="mt-1 text-slate-700">Large model biases — whether positive (overestimation) or negative (underestimation) — produce large residuals when computing prediction error. Large prediction error means fewer credits survive the uncertainty deduction. So even a positively biased model that overestimates benefits is <em>penalized through the credit deduction system</em>. There is no "free lunch" from inflating model outputs.</p>
</div>

<h3 class="text-xl font-bold mt-6 mb-3">The Prediction Error Test (Section 5.2.5)</h3>
<p class="mb-3 text-sm">Even an unbiased model may be imprecise — its predictions scatter widely around observed values. VMD0053 quantifies this as <strong>model prediction error</strong>, which is used to deduct credits under VM0042's uncertainty framework.</p>

<div class="formula-box p-4 mb-4">
  <p class="font-bold text-green-300 mb-2">Model Prediction Error Variance</p>
  <p class="font-mono text-base text-yellow-200">σ²_model = Σ [(mod_j − obs_j) − μ_(mod−obs)]² / (k − 1)</p>
  <div class="mt-3 text-sm text-slate-300">
    <p>where μ_(mod−obs) = mean of all (modeled − observed) differences across k observations</p>
    <p class="mt-1">σ_model = √σ²_model (the standard deviation of prediction errors)</p>
  </div>
</div>

<div class="formula-box p-4 mb-6">
  <p class="font-bold text-green-300 mb-2">90% Prediction Interval (frequentist models)</p>
  <p class="font-mono text-base text-yellow-200">PI_i = [μ_i − 1.64 × σ_model, μ_i + 1.64 × σ_model]</p>
  <div class="mt-3 text-sm text-slate-300">
    <p>μ_i = modeled effect of practice change for observation i</p>
    <p class="mt-1">1.64 = z-score for 90% confidence under standard normal distribution</p>
  </div>
  <p class="text-slate-300 text-sm mt-2"><strong>Confidence coverage test:</strong> At least 90% of observed validation data values must fall within these intervals → model PASSES</p>
  <p class="text-slate-400 text-xs mt-1"><em>Note: A prediction interval tells you where a future individual observation is expected to fall. A confidence interval tells you uncertainty in an estimated mean. VMD0053 uses prediction intervals — the harder test — because it is checking individual data points, not just the average.</em></p>
</div>

<div class="example-box p-4 rounded mb-6">
  <p class="font-semibold text-amber-800">📐 Prediction Error: Continuing the Worked Example</p>
  <p class="mt-2 text-sm">From the five modeled-observed pairs in our earlier example, suppose:</p>
  <p class="font-mono text-sm bg-slate-100 p-2 rounded mt-1">σ²_model = 35.2 → σ_model = √35.2 = 5.9 tCO₂e</p>
  <p class="text-sm mt-2">For modeled value μ_i = 6.8: 90% PI = [6.8 − 1.64×5.9, 6.8 + 1.64×5.9] = [−2.9, 16.5]</p>
  <p class="text-sm">For modeled value μ_i = −4.0: 90% PI = [−4.0 − 9.7, −4.0 + 9.7] = [−13.7, 5.7]</p>
  <p class="text-sm mt-2">The test: Are all (or at least 90% of) observed values within their respective intervals?</p>
  <p class="text-sm font-bold text-amber-800 mt-1">If yes → model PASSES confidence coverage test → σ_model is used in VM0042 credit deductions</p>
</div>

<div class="bg-blue-50 border border-blue-200 rounded p-4 mb-6 text-sm">
  <p class="font-semibold text-blue-800">How Model Prediction Error Flows into Credit Deductions</p>
  <p class="mt-1 text-blue-900">VM0042 uses a probability-of-exceedance framework for uncertainty. The model prediction error (σ_model) becomes one of the uncertainty inputs to the 95% confidence lower-bound calculation. A larger σ_model means the lower-bound estimate of carbon benefits is further from the central estimate — and fewer VCUs are issued. This is why improving model precision directly increases project revenue.</p>
</div>

<h3 class="text-xl font-bold mt-6 mb-3">Two Options for Calculating Prediction Error</h3>
<table class="mb-6 text-sm">
  <tr><th>Option</th><th>When Used</th><th>Method</th></tr>
  <tr><td><strong>Option A: Analytical</strong></td><td>Sufficient field trial data available</td><td>Direct calculation of variance of (modeled − observed) differences</td></tr>
  <tr><td><strong>Option B: Monte Carlo</strong></td><td>Models with parameter uncertainty (e.g., Bayesian)</td><td>Posterior predictive distributions (PPDs) resampled iteratively to estimate prediction error</td></tr>
</table>

<h3 class="text-xl font-bold mt-6 mb-3">The Model Validation Report (MVR) and IME Review</h3>
<p class="mb-3 text-sm">All validation work is documented in a <strong>Model Validation Report (MVR)</strong>, which must be reviewed by an <strong>Independent Modeling Expert (IME)</strong> contracted by the VVB.</p>

<div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
  <div class="bg-slate-50 border border-slate-200 rounded p-4 text-sm">
    <h4 class="font-bold text-slate-800 mb-2">What the MVR Must Contain</h4>
    <ul class="space-y-1 text-slate-700">
      <li>• Model version and calibration process description</li>
      <li>• All internal model parameter sets with proof of climate-zone-level resolution</li>
      <li>• Full citation of calibration and validation datasets</li>
      <li>• Per-study bias and mean bias across all studies (ranked highest to lowest)</li>
      <li>• All PMU values used for each PC/CFG/ES combination</li>
      <li>• Graphs of measured vs modeled with 90% prediction interval coverage</li>
      <li>• Scatterplot and histogram of residuals (modeled − observed)</li>
      <li>• Mean squared error for each combination</li>
    </ul>
  </div>
  <div class="bg-indigo-50 border border-indigo-200 rounded p-4 text-sm">
    <h4 class="font-bold text-indigo-800 mb-2">IME Assessment Steps</h4>
    <ol class="list-decimal ml-4 space-y-1 text-indigo-900">
      <li>Project proponent submits MVR to VVB</li>
      <li>VVB selects and contracts an IME meeting Verra's minimum qualifications</li>
      <li>IME assesses: model eligibility (Section 4), calibration procedures, bias and prediction error calculations, confidence coverage</li>
      <li>IME issues an assessment report submitted to VVB</li>
      <li>Both MVR and IME assessment report are made publicly available in the Verra registry</li>
    </ol>
  </div>
</div>

<div class="bg-amber-50 border border-amber-200 rounded p-4 mb-6 text-sm">
  <p class="font-semibold text-amber-800">IME Minimum Qualifications</p>
  <ul class="mt-1 space-y-1 text-amber-900">
    <li>• ≥5 years relevant experience quantifying GHG fluxes from ALM using biogeochemical models</li>
    <li>• Demonstrated use of the specific model type or conceptually similar models (peer-reviewed publications or project reports as evidence)</li>
    <li>• Freedom from conflict of interest (organizational affiliations must be disclosed)</li>
    <li>• Two references from researchers or academic staff</li>
  </ul>
</div>

<div class="bg-amber-50 border border-amber-200 rounded p-3 mb-4 text-sm">
  <p class="font-semibold text-amber-800">Peer-Reviewed Journal Alternative</p>
  <p class="mt-1 text-amber-900">Instead of a standalone IME review, an MVR may be published in one of 30+ approved peer-reviewed journals listed in VMD0053 Table 3 (including <em>Geoderma, Global Biogeochemical Cycles, Soil Science Society of America Journal</em>, etc.) AND reviewed by an IME. The peer-reviewed publication must explicitly state its purpose as validating the model for VCS carbon credits under ISO 14064. <strong>Important:</strong> the project proponent must also submit a separate sub-report outlining how the MVR requirements have been met and clarifying any aspects of the peer-reviewed paper as it pertains to the overall requirements — the published paper alone is not sufficient.</p>
</div>

<div class="bg-blue-50 border border-blue-200 rounded p-4 mb-4 text-sm">
  <p class="font-semibold text-blue-800">Petitions for Exception: When Tests Fail Due to Data Scarcity</p>
  <p class="mt-1 text-blue-900">Failing the bias test or the 90% confidence coverage test is not always an automatic dead end. VMD0053 allows project proponents to <em>petition for validation approval</em> even when strict thresholds are not met, where data scarcity is the documented reason. For example:</p>
  <ul class="list-disc ml-5 mt-1 space-y-1 text-blue-900">
    <li>Bias &gt; PMU: petition allowed if the mean bias is demonstrably due to insufficient validation observations, subject to IME and VVB approval</li>
    <li>Coverage below 90%: petition allowed for marginal failures (e.g., 6/7 or 7/8 observations covered) where global data gaps exist for the specific PC/CFG/ES combination</li>
  </ul>
  <p class="mt-1 text-blue-900">Petitions are evaluated case-by-case and require clear justification — they are not routine exceptions.</p>
</div>

<div class="bg-slate-50 border border-slate-200 rounded p-4 mb-6 text-sm">
  <p class="font-semibold text-slate-800">Default PMU When Standard Errors Are Not Published</p>
  <p class="mt-1 text-slate-700">Many legacy soil studies do not report standard errors for their measurements, making it impossible to compute PMU directly. In these cases, VMD0053 allows a <em>default replacement PMU value</em> based on typical measurement error for the specific measurement technique (e.g., the combined measurement error of the SOC content and bulk density measurement techniques used). PMU may also be defined as a function of cumulative sampling depth based on observed measurement uncertainty in validation datasets. These default values must be justified and are subject to IME approval and VVB review. The North American Proficiency Testing Program (NAPT) is suggested as a reference for instrument-specific measurement error rates.</p>
</div>

<h3 class="text-xl font-bold mt-6 mb-3">When Must the MVR Be Updated?</h3>
<ul class="list-disc ml-6 text-sm space-y-1 mb-4">
  <li>Project area expands to include new PCs, CFGs, or emission sources not covered in the original MVR</li>
  <li>Model is changed in a way that substantially affects model runs and estimated emission reductions/removals</li>
  <li>The MVR must be submitted alongside each monitoring report — the existing MVR continues to apply as long as the project remains within the already validated domain</li>
</ul>

<div class="bg-green-50 border border-green-200 rounded p-4 text-sm">
  <p class="font-semibold text-green-800">Summary: What VMD0053 Delivers</p>
  <ul class="mt-2 space-y-2 text-green-900">
    <li>✓ Bias test ensures the model is not systematically distorting results</li>
    <li>✓ Prediction error quantifies model imprecision → directly fed into VM0042's credit deduction formula</li>
    <li>✓ Confidence coverage test (90% of observations within 90% prediction intervals) ensures statistical validity</li>
    <li>✓ IME review provides independent expert oversight — same role the VVB plays for project data</li>
    <li>✓ Public MVR and IME report ensure transparency and reproducibility</li>
  </ul>
</div>

<h2 class="text-2xl font-bold text-gray-800 mb-4">AFOLU Non-Permanence Risk Tool: Internal & External Risk Scoring</h2>

function Quiz({ questions, lessonId }) {
  const storageKey = `vm0042_quiz_${lessonId}`;
  const [answers, setAnswers] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem(storageKey))?.answers || {}; } catch { return {}; }
  });
  const [submitted, setSubmitted] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem(storageKey))?.submitted || {}; } catch { return {}; }
  });

  React.useEffect(() => {
    localStorage.setItem(storageKey, JSON.stringify({ answers, submitted }));
  }, [answers, submitted]);

  if (!questions || questions.length === 0) return null;

  const allSubmitted = questions.every((_, qi) => submitted[qi]);
  const correctCount = allSubmitted ? questions.filter((q, qi) => answers[qi] === q.answer).length : 0;

  const selectAnswer = (qi, oi) => {
    if (!submitted[qi]) setAnswers(a => ({...a, [qi]: oi}));
  };

  return (
    <div className="mt-8 border-t pt-6">
      <h3 className="text-lg font-bold text-gray-800 mb-4">🧠 Knowledge Check</h3>
      {questions.map((q, qi) => (
        <div key={qi} className="mb-6 bg-white border rounded-lg p-4 shadow-sm">
          <p className="font-semibold text-gray-800 mb-3">{qi + 1}. {q.q}</p>
          <div className="space-y-2" role="radiogroup" aria-label={`Question ${qi + 1}`}>
            {q.options.map((opt, oi) => {
              const sel = answers[qi];
              const isSelected = sel === oi;
              const isCorrect = oi === q.answer;
              const isLocked = !!submitted[qi];
              let cls = "quiz-option p-3 rounded border text-sm ";
              cls += isLocked ? "cursor-default " : "cursor-pointer ";
              if (isLocked) {
                if (isCorrect) cls += "bg-green-50 border-green-400 text-green-800 font-medium";
                else if (isSelected) cls += "bg-red-50 border-red-400 text-red-800";
                else cls += "border-gray-200 text-gray-500";
              } else {
                cls += isSelected ? "bg-blue-50 border-blue-400 text-blue-800" : "border-gray-200 hover:border-blue-300 hover:bg-blue-50 text-gray-700";
              }
              return (
                <div key={oi} role="radio" aria-checked={isSelected}
                  tabIndex={isLocked ? -1 : 0}
                  className={cls}
                  onClick={() => selectAnswer(qi, oi)}
                  onKeyDown={(e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); selectAnswer(qi, oi); } }}>
                  <span className="mr-2 font-mono">{["A","B","C","D"][oi]}.</span>{opt}
                </div>
              );
            })}
          </div>
          {!submitted[qi] && answers[qi] !== undefined && (
            <button onClick={() => setSubmitted(s => ({...s, [qi]: true}))}
              className="mt-3 px-4 py-1.5 bg-gray-800 text-white text-sm rounded hover:bg-gray-700">
              Check Answer
            </button>
          )}
          {submitted[qi] && (
            <div className={`mt-3 p-3 rounded text-sm ${answers[qi] === q.answer ? "bg-green-50 text-green-800" : "bg-amber-50 text-amber-800"}`}>
              {answers[qi] === q.answer ? "✅ Correct! " : "❌ Not quite. "}{q.explanation}
            </div>
          )}
        </div>
      ))}
      {allSubmitted && (
        <div className={`p-4 rounded-lg text-center font-semibold text-sm ${correctCount === questions.length ? "bg-green-100 text-green-800" : correctCount >= questions.length / 2 ? "bg-amber-50 text-amber-800" : "bg-red-50 text-red-800"}`}>
          {correctCount === questions.length ? "🎉 Perfect score! " : correctCount >= questions.length / 2 ? "👍 Good effort! " : "📖 Keep studying! "}
          You got {correctCount} of {questions.length} correct.
        </div>
      )}
    </div>
  );
}

// LESSON VIEW
// ============================================================
function LessonView({ lessonId, onComplete, completed, moduleColor, onPrev, onNext }) {
  const lesson = LESSONS[lessonId];
  if (!lesson) return <div className="p-8 text-gray-500">Lesson not found.</div>;
  const c = colorMap[moduleColor] || colorMap.green;
  const mod = MODULES.find(m => m.lessons.some(l => l.id === lessonId));
  const lessonIndexInMod = mod ? mod.lessons.findIndex(l => l.id === lessonId) : -1;
  return (
    <div className="fade-in max-w-3xl mx-auto px-6 py-8">
      {/* Prev / Next nav row */}
      <div className="flex items-center justify-between mb-4">
        {onPrev
          ? <button onClick={onPrev} className="text-sm text-gray-500 hover:text-gray-800 flex items-center gap-1 transition">← Previous</button>
          : <div />}
        {onNext
          ? <button onClick={onNext} className="text-sm text-gray-500 hover:text-gray-800 flex items-center gap-1 transition">Next →</button>
          : <div />}
      </div>
      {/* Lesson meta row */}
      <div className="flex items-center gap-2 mb-2 flex-wrap">
        <span className={`text-xs font-mono px-2 py-0.5 rounded ${c.bg} ${c.text}`}>
          Lesson {lessonId}
        </span>
        {mod && lessonIndexInMod >= 0 && (
          <span className="text-xs text-gray-500">{lessonIndexInMod + 1} of {mod.lessons.length} in {mod.title}</span>
        )}
        <span className="text-xs text-gray-500">· VM0042 ref: {lesson.vmRef}</span>
        <span className="text-xs text-gray-500 ml-auto">⏱ {lesson.duration}</span>
      </div>
      <div className="prose max-w-none" dangerouslySetInnerHTML={{__html: lesson.content}} />
      <Quiz questions={lesson.quiz} lessonId={lessonId} />
      {!completed && (
        <div className="mt-8 text-center">
          <button onClick={onComplete}
            className={`px-6 py-2 ${c.btn} text-white rounded-lg font-medium shadow transition`}>
            ✓ Mark as Complete & Continue
          </button>
        </div>
      )}
      {completed && (
        <div className="mt-8 text-center">
          <span className="inline-flex items-center gap-2 px-4 py-2 bg-green-100 text-green-800 rounded-lg text-sm font-medium">
            ✅ Lesson Completed
          </span>
        </div>
      )}
      {/* Bottom prev/next nav */}
      <div className="flex items-center justify-between mt-10 pt-6 border-t border-gray-100">
        {onPrev
          ? <button onClick={onPrev} className="text-sm text-gray-500 hover:text-gray-800 flex items-center gap-1 transition">← Previous</button>
          : <div />}
        {onNext
          ? <button onClick={onNext} className="text-sm text-gray-500 hover:text-gray-800 flex items-center gap-1 transition">Next →</button>
          : <div />}
      </div>
    </div>
  );
}

// ============================================================
// SIDEBAR
// ============================================================
function Sidebar({ currentLesson, onSelect, completed, collapsed, setCollapsed }) {
  const [expanded, setExpanded] = React.useState({ 0: true });

  // Auto-expand the module containing the active lesson
  React.useEffect(() => {
    if (currentLesson) {
      const mod = MODULES.find(m => m.lessons.some(l => l.id === currentLesson));
      if (mod) setExpanded(e => ({...e, [mod.id]: true}));
    }
  }, [currentLesson]);

  return (
    <>
    <div className={`bg-white border-r flex flex-col transition-all flex-shrink-0 ${collapsed ? "w-0 md:w-14 overflow-hidden" : "w-64 absolute md:relative inset-y-0 left-0 z-50 h-full shadow-xl md:shadow-none"}`}>
      <div className="flex items-center justify-between px-3 py-3 border-b bg-green-800">
        {!collapsed && <span className="text-white font-bold text-sm truncate">VM0042 Course</span>}
        <button onClick={() => setCollapsed(c => !c)} className="text-white hover:text-green-200 ml-auto">
          {collapsed ? "▶" : "◀"}
        </button>
      </div>
      <div className="sidebar-scroll flex-1">
        {MODULES.map(mod => {
          const c = colorMap[mod.color] || colorMap.green;
          const totalLessons = mod.lessons.length;
          const doneCount = mod.lessons.filter(l => completed[l.id]).length;
          const isExp = expanded[mod.id];
          return (
            <div key={mod.id} className="border-b">
              <button
                onClick={() => setExpanded(e => ({...e, [mod.id]: !e[mod.id]}))}
                className={`w-full flex items-center gap-2 px-3 py-2.5 hover:bg-gray-50 ${collapsed ? "justify-center" : ""}`}>
                <span className="text-lg flex-shrink-0">{mod.icon}</span>
                {!collapsed && (
                  <>
                    <div className="flex-1 text-left min-w-0">
                      <div className="text-xs font-semibold text-gray-700 truncate">{mod.title}</div>
                      <div className="text-xs text-gray-500">{doneCount}/{totalLessons} done</div>
                    </div>
                    <span className="text-gray-500 text-xs">{isExp ? "▾" : "▸"}</span>
                  </>
                )}
              </button>
              {isExp && !collapsed && mod.lessons.map(lesson => {
                const isActive = currentLesson === lesson.id;
                const isDone = completed[lesson.id];
                return (
                  <button key={lesson.id}
                    onClick={() => onSelect(lesson.id)}
                    className={`w-full text-left px-4 py-2 text-xs flex items-center gap-2 hover:bg-gray-50 transition ${isActive ? c.active : ""}`}>
                    <span className={`w-4 h-4 rounded-full border text-center leading-3 flex-shrink-0 text-xs ${isDone ? "bg-green-500 border-green-500 text-white" : "border-gray-300"}`}>
                      {isDone ? "✓" : ""}
                    </span>
                    <span className={`truncate ${isActive ? "font-semibold" : "text-gray-600"}`}>{lesson.title}</span>
                  </button>
                );
              })}
            </div>
          );
        })}
      </div>
    </div>
    {/* Mobile overlay — tap outside to close sidebar */}
    {!collapsed && <div className="md:hidden fixed inset-0 bg-black bg-opacity-40 z-40" onClick={() => setCollapsed(true)} />}
    </>
  );
}

// ============================================================
// HOME / OVERVIEW
// ============================================================
function HomeView({ completed, onSelect }) {
  const total = Object.keys(LESSONS).length;
  const done = Object.values(completed).filter(Boolean).length;
  const pct = Math.round((done / total) * 100);
  return (
    <div className="max-w-4xl mx-auto px-6 py-8 fade-in">
      <div className="text-center mb-8">
        <div className="text-5xl mb-3">🌾</div>
        <h1 className="text-3xl font-bold text-gray-900">VM0042 Learning Module</h1>
        <p className="text-gray-500 mt-2">Improved Agricultural Land Management — Verra VCS Methodology v2.2</p>
        <div className="mt-4 max-w-sm mx-auto">
          <div className="flex justify-between text-sm text-gray-600 mb-1">
            <span>Overall Progress</span><span>{done}/{total} lessons • {pct}%</span>
          </div>
          <div className="w-full bg-gray-200 rounded-full h-3">
            <div className="progress-bar bg-green-600 h-3 rounded-full" style={{width: `${pct}%`}}></div>
          </div>
        </div>
      </div>
      {/* Resume Course CTA — shown only when in progress */}
      {done > 0 && done < total && (() => {
        const allLessonIds = MODULES.flatMap(m => m.lessons.map(l => l.id));
        const nextId = allLessonIds.find(id => !completed[id]);
        return nextId ? (
          <div className="mb-6 text-center">
            <button onClick={() => onSelect(nextId)}
              className="inline-flex items-center gap-3 px-6 py-3 bg-green-700 hover:bg-green-800 text-white rounded-lg font-medium shadow transition">
              <span>▶ Resume Course</span>
              <span className="text-sm text-green-200 max-w-xs truncate">{LESSONS[nextId]?.title}</span>
            </button>
          </div>
        ) : null;
      })()}
      <div className="grid gap-4 md:grid-cols-2">
        {MODULES.map(mod => {
          const c = colorMap[mod.color] || colorMap.green;
          const doneCount = mod.lessons.filter(l => completed[l.id]).length;
          const firstLesson = mod.lessons[0];
          return (
            <div key={mod.id} className="bg-white border rounded-xl p-5 shadow-sm hover:shadow transition cursor-pointer"
              onClick={() => onSelect(firstLesson.id)}>
              <div className="flex items-start gap-3">
                <span className="text-3xl">{mod.icon}</span>
                <div className="flex-1 min-w-0">
                  <div className={`text-xs font-mono px-2 py-0.5 rounded inline-block mb-1 ${c.bg} ${c.text}`}>
                    Module {mod.id + 1}
                  </div>
                  <h3 className="font-bold text-gray-800">{mod.title}</h3>
                  <p className="text-sm text-gray-500 mt-0.5">{mod.subtitle}</p>
                  <div className="mt-3 flex items-center gap-3">
                    <div className="flex-1 bg-gray-100 rounded-full h-1.5">
                      <div className={`h-1.5 rounded-full ${c.btn.split(' ')[0]}`}
                        style={{width: `${(doneCount/mod.lessons.length)*100}%`}}></div>
                    </div>
                    <span className="text-xs text-gray-500">{doneCount}/{mod.lessons.length}</span>
                  </div>
                </div>
              </div>
              <div className="mt-3 flex flex-wrap gap-1">
                {mod.lessons.map(l => (
                  <span key={l.id}
                    className={`text-xs px-2 py-0.5 rounded ${completed[l.id] ? "bg-green-100 text-green-700" : "bg-gray-100 text-gray-500"}`}>
                    {l.id}
                  </span>
                ))}
              </div>
            </div>
          );
        })}
      </div>
      <div className="mt-6 bg-amber-50 border border-amber-200 rounded-lg p-4 text-sm text-amber-800">
        <strong>📚 How to use this course:</strong> Work through modules in order. Each lesson has explanations with real-world analogies, worked examples with actual numbers, and knowledge-check quizzes. Mark each lesson complete when done.
      </div>
      <footer className="mt-8 text-center text-xs text-gray-400 py-4 border-t border-gray-100">
        Made with 💚 for Muskan — She said she will read it. 🌱
      </footer>
    </div>
  );
}

// ============================================================
// MAIN APP
// ============================================================
function App() {
  const STORAGE_KEY = "vm0042_progress";
  const [completed, setCompleted] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; }
  });
  const [currentLesson, setCurrentLesson] = React.useState(null);
  const [collapsed, setCollapsed] = React.useState(false);

  const allLessons = MODULES.flatMap(m => m.lessons.map(l => l.id));

  const saveComplete = (id) => {
    const updated = {...completed, [id]: true};
    setCompleted(updated);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(updated));
    // Auto-advance to next lesson
    const idx = allLessons.indexOf(id);
    if (idx < allLessons.length - 1) setCurrentLesson(allLessons[idx + 1]);
  };

  const currentIdx = currentLesson ? allLessons.indexOf(currentLesson) : -1;
  const prevLesson = currentIdx > 0 ? allLessons[currentIdx - 1] : null;
  const nextLesson = currentIdx >= 0 && currentIdx < allLessons.length - 1 ? allLessons[currentIdx + 1] : null;

  const getModuleColor = (lessonId) => {
    for (const mod of MODULES) {
      if (mod.lessons.some(l => l.id === lessonId)) return mod.color;
    }
    return "green";
  };

  return (
    <div className="flex h-screen overflow-hidden bg-gray-50">
      <Sidebar currentLesson={currentLesson} onSelect={setCurrentLesson}
        completed={completed} collapsed={collapsed} setCollapsed={setCollapsed} />
      <div className="flex-1 flex flex-col overflow-hidden">
        {/* Top bar */}
        <div className="bg-green-800 text-white px-4 py-2 flex items-center gap-3 text-sm flex-shrink-0">
          {/* Hamburger — visible only on mobile when sidebar is collapsed */}
          {collapsed && (
            <button onClick={() => setCollapsed(false)} className="md:hidden text-white hover:text-green-200 mr-1" aria-label="Open menu">☰</button>
          )}
          <button onClick={() => setCurrentLesson(null)} className="hover:text-green-200 font-medium">
            🌾 VM0042
          </button>
          {currentLesson && (
            <>
              <span className="text-green-400">›</span>
              <span className="text-green-200 truncate">{LESSONS[currentLesson]?.title}</span>
            </>
          )}
          <div className="ml-auto text-xs text-green-100">
            {Object.values(completed).filter(Boolean).length}/{Object.keys(LESSONS).length} lessons complete
          </div>
        </div>
        {/* Content */}
        <div className="content-scroll flex-1">
          {currentLesson
            ? <LessonView lessonId={currentLesson} onComplete={() => saveComplete(currentLesson)}
                completed={completed[currentLesson]} moduleColor={getModuleColor(currentLesson)}
                onPrev={prevLesson ? () => setCurrentLesson(prevLesson) : null}
                onNext={nextLesson ? () => setCurrentLesson(nextLesson) : null} />
            : <HomeView completed={completed} onSelect={setCurrentLesson} />
          }
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
