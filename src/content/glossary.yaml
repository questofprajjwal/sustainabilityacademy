# ──────────────────────────────────────────────────────────────────────────────
# Glossary - Sustainability Academy
# Categories: carbon-markets, climate-science, ghg-accounting, esg,
#             sustainability, reporting-standards, climate-finance, governance
# ──────────────────────────────────────────────────────────────────────────────

# ─── A ────────────────────────────────────────────────────────────────────────

- term: "Additionality"
  slug: "additionality"
  definition: "The requirement that emission reductions would not have occurred without the carbon credit project. A project is additional if it would not have happened under a business-as-usual scenario."
  category: "carbon-markets"
  related: ["baseline-scenario", "crediting-period"]

- term: "Activity Data"
  slug: "activity-data"
  definition: "Quantitative measures of the level of activity giving rise to GHG emissions, such as litres of fuel consumed, kWh of electricity purchased, or kilometres driven."
  category: "ghg-accounting"
  related: ["emission-factor", "ghg"]

- term: "AFOLU"
  slug: "afolu"
  definition: "Agriculture, Forestry and Other Land Use - a sectoral category covering land-based greenhouse gas mitigation and carbon sequestration projects, including forestry, cropland, and livestock management."
  category: "carbon-markets"
  related: ["carbon-sequestration", "buffer-pool", "redd-plus"]

- term: "Article 6 (Paris Agreement)"
  slug: "article-6"
  definition: "The section of the Paris Agreement enabling international carbon market cooperation. Article 6.2 covers bilateral ITMO transfers, Article 6.4 establishes a centralized UN crediting mechanism, and Article 6.8 covers non-market approaches."
  category: "carbon-markets"
  related: ["paris-agreement", "itmo", "corresponding-adjustment", "ndc"]

- term: "Attribution Factor"
  slug: "attribution-factor"
  definition: "The share of a borrower's or investee's total emissions attributed to a specific financial institution, calculated as the institution's outstanding capital divided by the company's total financing."
  category: "climate-finance"
  related: ["financed-emissions", "pcaf"]

# ─── B ────────────────────────────────────────────────────────────────────────

- term: "Baseline Scenario"
  slug: "baseline-scenario"
  definition: "The reference case describing what would have happened in the absence of a carbon project. Used to calculate emission reductions by comparing project emissions against it."
  category: "carbon-markets"
  related: ["additionality", "emission-reductions"]

- term: "Biodiversity"
  slug: "biodiversity"
  definition: "The variety of life on Earth at genetic, species, and ecosystem levels. Underpins ecosystem services vital to human society including pollination, water purification, and climate regulation."
  category: "sustainability"
  related: ["natural-capital", "ecosystem-services", "tnfd"]

- term: "Biochar"
  slug: "biochar"
  definition: "A highly stable, carbon-rich solid produced by thermochemical conversion of waste biomass in an oxygen-limited environment. Applied to soil or incorporated into products for long-term carbon storage."
  category: "carbon-markets"
  related: ["pyrolysis", "carbon-sequestration"]

- term: "Buffer Pool"
  slug: "buffer-pool"
  definition: "A reserve of carbon credits set aside from AFOLU (forestry/land-use) projects to cover potential reversals of carbon storage, such as from fire, disease, or land-use change."
  category: "carbon-markets"
  related: ["permanence", "carbon-sequestration"]

# ─── C ────────────────────────────────────────────────────────────────────────

- term: "Carbon Budget"
  slug: "carbon-budget"
  definition: "The finite cumulative amount of CO2 that can still be emitted while keeping global warming within a specific temperature threshold. Approximately 500 Gt CO2 remained from 2020 for a 50% chance of limiting warming to 1.5C."
  category: "climate-science"
  related: ["paris-agreement", "net-zero", "1-5c-pathway"]

- term: "Carbon Credit"
  slug: "carbon-credit"
  definition: "A tradable certificate representing the reduction or removal of one metric tonne of carbon dioxide equivalent (tCO2e) from the atmosphere."
  category: "carbon-markets"
  related: ["vcu", "emission-reductions"]

- term: "Carbon Dioxide Removal (CDR)"
  slug: "cdr"
  definition: "The physical extraction of CO2 from the atmosphere and durable storage in geological formations, soils, biomass, or products. Distinct from emission reductions, which prevent emissions from occurring."
  category: "climate-science"
  related: ["carbon-sequestration", "direct-air-capture", "net-zero"]

- term: "Carbon Pricing"
  slug: "carbon-pricing"
  definition: "Mechanisms that put a monetary cost on greenhouse gas emissions, including carbon taxes (fixed price per tonne) and emissions trading systems (cap-and-trade markets)."
  category: "climate-finance"
  related: ["ets", "shadow-carbon-price"]

- term: "Carbon Sequestration"
  slug: "carbon-sequestration"
  definition: "The process of capturing and storing atmospheric carbon dioxide, either through biological processes (trees, soil) or technological means (carbon capture and storage)."
  category: "climate-science"
  related: ["ghg", "net-zero"]

- term: "CBAM"
  slug: "cbam"
  definition: "Carbon Border Adjustment Mechanism - EU import tariffs calibrated to the carbon price not paid in the country of origin, designed to prevent carbon leakage from industries relocating to avoid carbon costs."
  category: "climate-finance"
  related: ["ets", "carbon-pricing"]

- term: "CDP"
  slug: "cdp"
  definition: "Carbon Disclosure Project - a global non-profit running the world's largest environmental disclosure system. Companies and cities report climate, water, and forest data through annual questionnaires scored from D- to A."
  category: "reporting-standards"
  related: ["tcfd", "ghg", "sbti"]

- term: "CDM"
  slug: "cdm"
  definition: "Clean Development Mechanism - a Kyoto Protocol mechanism allowing developed countries to fund emission reduction projects in developing countries and earn Certified Emission Reduction (CER) credits."
  category: "carbon-markets"
  related: ["kyoto-protocol", "carbon-credit"]

- term: "CER"
  slug: "cer"
  definition: "Certified Emission Reduction - a carbon credit issued under the Kyoto Protocol's Clean Development Mechanism, representing one tonne of CO2e reduced."
  category: "carbon-markets"
  related: ["cdm", "carbon-credit"]

- term: "Circular Economy"
  slug: "circular-economy"
  definition: "A production and consumption model that eliminates waste and keeps materials in use through designing out waste, keeping products in circulation, and regenerating natural systems."
  category: "sustainability"
  related: ["sdgs", "natural-capital"]

- term: "Climate Scenario Analysis"
  slug: "climate-scenario-analysis"
  definition: "A forward-looking technique that tests how an organization or portfolio would perform under different plausible climate futures, typically including orderly transition, disorderly transition, and failed transition pathways."
  category: "climate-finance"
  related: ["tcfd", "transition-risk", "physical-risk"]

- term: "Co-benefits"
  slug: "co-benefits"
  definition: "Positive outcomes from a carbon project beyond greenhouse gas mitigation, such as biodiversity conservation, community livelihoods, improved water quality, or health benefits."
  category: "carbon-markets"
  related: ["sdgs"]

- term: "CO2e"
  slug: "co2e"
  definition: "Carbon dioxide equivalent - a standard unit for measuring carbon footprints that expresses the impact of different greenhouse gases in terms of the amount of CO2 that would create the same warming."
  category: "ghg-accounting"
  related: ["gwp", "ghg"]

- term: "COP"
  slug: "cop"
  definition: "Conference of the Parties - the annual climate negotiations under the UN Framework Convention on Climate Change. Key milestones include COP21 (Paris Agreement, 2015) and COP26 (Glasgow, Article 6 rules)."
  category: "climate-science"
  related: ["paris-agreement", "ndc"]

- term: "CORSIA"
  slug: "corsia"
  definition: "Carbon Offsetting and Reduction Scheme for International Aviation - ICAO's global market-based mechanism requiring airlines to offset growth in international aviation emissions above 2019 levels."
  category: "carbon-markets"
  related: ["carbon-credit", "article-6"]

- term: "Corresponding Adjustment"
  slug: "corresponding-adjustment"
  definition: "An accounting mechanism under Article 6 where a host country adds transferred emission reductions back to its own emissions total while the acquiring country subtracts them, preventing double counting."
  category: "carbon-markets"
  related: ["article-6", "itmo", "ndc"]

- term: "Crediting Period"
  slug: "crediting-period"
  definition: "The time period during which a carbon project can generate verified emission reductions or removals and issue carbon credits."
  category: "carbon-markets"
  related: ["additionality", "monitoring"]

- term: "CSRD"
  slug: "csrd"
  definition: "Corporate Sustainability Reporting Directive - EU law requiring large companies to include sustainability data in management reports, assessed against European Sustainability Reporting Standards (ESRS)."
  category: "reporting-standards"
  related: ["esrs", "double-materiality", "efrag"]

# ─── D ────────────────────────────────────────────────────────────────────────

- term: "Decarbonization"
  slug: "decarbonization"
  definition: "The process of reducing carbon intensity by transitioning away from fossil fuels toward low-carbon energy sources and practices across the economy."
  category: "climate-science"
  related: ["net-zero", "transition-risk", "1-5c-pathway"]

- term: "Direct Air Capture (DAC)"
  slug: "direct-air-capture"
  definition: "Technology that physically extracts CO2 directly from the ambient atmosphere and stores it permanently in geological formations or products. Used for neutralizing residual emissions that cannot be abated."
  category: "climate-science"
  related: ["cdr", "carbon-sequestration", "net-zero"]

- term: "DNSH"
  slug: "dnsh"
  definition: "Do No Significant Harm - a principle requiring that sustainable investments or activities do not cause major damage to other environmental or social objectives while pursuing their primary goal."
  category: "reporting-standards"
  related: ["eu-taxonomy", "sfdr"]

- term: "Double Counting"
  slug: "double-counting"
  definition: "The risk that the same emission reduction is claimed by more than one party, undermining environmental integrity. Corresponding adjustments under Article 6 are designed to prevent this."
  category: "carbon-markets"
  related: ["corresponding-adjustment", "article-6"]

- term: "Double Materiality"
  slug: "double-materiality"
  definition: "Assessment of both impact materiality (how a company affects people and environment) and financial materiality (how sustainability issues create financial risks or opportunities for the company)."
  category: "reporting-standards"
  related: ["csrd", "esrs", "materiality"]

- term: "Due Diligence"
  slug: "due-diligence"
  definition: "The process of identifying, preventing, mitigating, and accounting for actual and potential negative impacts on human rights, the environment, and governance across a company's operations and value chain."
  category: "esg"
  related: ["value-chain", "csrd"]

# ─── E ────────────────────────────────────────────────────────────────────────

- term: "Ecosystem Services"
  slug: "ecosystem-services"
  definition: "Benefits that nature provides to human society, including pollination, flood control, water purification, climate regulation, and soil formation."
  category: "sustainability"
  related: ["biodiversity", "natural-capital"]

- term: "EFRAG"
  slug: "efrag"
  definition: "European Financial Reporting Advisory Group - the technical body responsible for developing European Sustainability Reporting Standards (ESRS) under the CSRD."
  category: "reporting-standards"
  related: ["esrs", "csrd"]

- term: "Emission Factor"
  slug: "emission-factor"
  definition: "A coefficient that quantifies emissions per unit of activity. For example, kg CO2 per litre of diesel burned, or tCO2e per MWh of grid electricity."
  category: "ghg-accounting"
  related: ["ghg", "scope-1", "activity-data"]

- term: "Emission Reductions"
  slug: "emission-reductions"
  definition: "The measurable decrease in greenhouse gas emissions achieved by a project, calculated as the difference between baseline emissions and project emissions."
  category: "carbon-markets"
  related: ["baseline-scenario", "carbon-credit"]

- term: "Emissions Trading System (ETS)"
  slug: "ets"
  definition: "A cap-and-trade mechanism that sets an overall emissions cap and allows companies to buy and sell emission allowances. The EU ETS is the world's largest, covering power generation and heavy industry."
  category: "climate-finance"
  related: ["carbon-pricing", "cbam"]

- term: "ESG"
  slug: "esg"
  definition: "Environmental, Social, and Governance - a framework for evaluating corporate sustainability and ethical impact across three pillars."
  category: "esg"
  related: ["gri", "sdgs"]

- term: "ESG Integration"
  slug: "esg-integration"
  definition: "The systematic inclusion of ESG factors into financial analysis and investment decisions, going beyond exclusionary screening to embed sustainability into valuation models."
  category: "climate-finance"
  related: ["esg", "fiduciary-duty"]

- term: "ESRS"
  slug: "esrs"
  definition: "European Sustainability Reporting Standards - 12 mandatory disclosure standards (covering cross-cutting, environment, social, and governance topics) developed by EFRAG for use under the CSRD."
  category: "reporting-standards"
  related: ["csrd", "efrag", "double-materiality"]

- term: "EU Taxonomy"
  slug: "eu-taxonomy"
  definition: "A classification system defining which economic activities are environmentally sustainable based on six environmental objectives, including climate mitigation, adaptation, water, circular economy, pollution, and biodiversity."
  category: "reporting-standards"
  related: ["sfdr", "dnsh", "csrd"]

# ─── F ────────────────────────────────────────────────────────────────────────

- term: "Fiduciary Duty"
  slug: "fiduciary-duty"
  definition: "The legal obligation to act in the best long-term financial interests of beneficiaries. The 2004 Freshfields Report established that ESG integration is consistent with fiduciary duty."
  category: "climate-finance"
  related: ["esg-integration", "pri"]

- term: "Financed Emissions"
  slug: "financed-emissions"
  definition: "GHG emissions that financial institutions indirectly cause through their lending and investment activities, classified as Scope 3 Category 15. Typically exceed a bank's operational emissions by 700x or more."
  category: "climate-finance"
  related: ["pcaf", "scope-3", "attribution-factor"]

- term: "FLAG"
  slug: "flag"
  definition: "Forest, Land and Agriculture - SBTi's specialized guidance requiring companies with significant land-use emissions to set separate targets for biological and agricultural emissions distinct from industrial emissions."
  category: "carbon-markets"
  related: ["sbti", "afolu"]

- term: "Fugitive Emissions"
  slug: "fugitive-emissions"
  definition: "Intentional or unintentional releases of greenhouse gases from equipment leaks, industrial processes, coal mines, or refrigeration and air-conditioning systems."
  category: "ghg-accounting"
  related: ["scope-1", "ghg"]

# ─── G ────────────────────────────────────────────────────────────────────────

- term: "GHG"
  slug: "ghg"
  definition: "Greenhouse Gas - any gas that absorbs and re-emits infrared radiation, trapping heat in the atmosphere. The main GHGs are CO2, CH4, N2O, HFCs, PFCs, SF6, and NF3."
  category: "climate-science"
  related: ["gwp", "scope-1"]

- term: "GHG Protocol"
  slug: "ghg-protocol"
  definition: "The most widely used international accounting standard for measuring and managing greenhouse gas emissions. Comprises the Corporate Standard (Scope 1 and 2) and the Corporate Value Chain Standard (Scope 3)."
  category: "ghg-accounting"
  related: ["scope-1", "scope-2", "scope-3"]

- term: "Green Bond"
  slug: "green-bond"
  definition: "A fixed-income instrument with proceeds earmarked specifically to fund climate and environmental projects such as renewable energy, energy efficiency, and clean transport."
  category: "climate-finance"
  related: ["social-bond", "sustainability-linked-bond"]

- term: "Greenwashing"
  slug: "greenwashing"
  definition: "The practice of making misleading or unsubstantiated claims about the environmental or social benefits of a product, service, or investment strategy to attract capital or customers."
  category: "esg"
  related: ["sfdr", "esg"]

- term: "GRI"
  slug: "gri"
  definition: "Global Reporting Initiative - an international standards organization that provides the world's most widely used framework for sustainability reporting."
  category: "reporting-standards"
  related: ["esg", "sdgs"]

- term: "GWP"
  slug: "gwp"
  definition: "Global Warming Potential - a measure of how much heat a greenhouse gas traps in the atmosphere relative to CO2 over a specified time period (typically 100 years). Methane has a GWP of 28."
  category: "climate-science"
  related: ["ghg", "co2e"]

# ─── I ────────────────────────────────────────────────────────────────────────

- term: "IFRS S2"
  slug: "ifrs-s2"
  definition: "The ISSB's climate-related disclosure standard requiring companies to report on governance, strategy, risk management, and metrics and targets related to climate risks and opportunities."
  category: "reporting-standards"
  related: ["issb", "tcfd", "scope-1"]

- term: "Impact Investing"
  slug: "impact-investing"
  definition: "Investments made with the specific intent to generate measurable positive social or environmental impact alongside a financial return."
  category: "climate-finance"
  related: ["esg-integration", "sdgs"]

- term: "IPCC"
  slug: "ipcc"
  definition: "Intergovernmental Panel on Climate Change - the leading international body for assessing climate change science. Its assessment reports synthesize thousands of studies to inform policy."
  category: "climate-science"
  related: ["paris-agreement", "1-5c-pathway", "gwp"]

- term: "ISO 14064"
  slug: "iso-14064"
  definition: "International standard for GHG accounting and verification, consisting of three parts: organizational-level quantification (Part 1), project-level quantification (Part 2), and verification guidance (Part 3)."
  category: "ghg-accounting"
  related: ["ghg-protocol", "scope-1"]

- term: "ISSB"
  slug: "issb"
  definition: "International Sustainability Standards Board - established in 2021 to develop a global baseline of sustainability disclosure standards (IFRS S1 and S2) for capital markets."
  category: "reporting-standards"
  related: ["ifrs-s2", "tcfd"]

- term: "ITMO"
  slug: "itmo"
  definition: "Internationally Transferred Mitigation Outcome - the unit of exchange under Article 6.2, representing emission reductions transferred between countries with corresponding adjustments applied."
  category: "carbon-markets"
  related: ["article-6", "corresponding-adjustment", "ndc"]

# ─── J ────────────────────────────────────────────────────────────────────────

- term: "Just Transition"
  slug: "just-transition"
  definition: "Ensuring the economic burdens and benefits of decarbonization are distributed equitably across society, with support for workers and communities most affected by the shift to a low-carbon economy."
  category: "sustainability"
  related: ["decarbonization", "sdgs"]

# ─── K ────────────────────────────────────────────────────────────────────────

- term: "Kyoto Protocol"
  slug: "kyoto-protocol"
  definition: "The first binding international climate agreement (1997) establishing carbon markets through the Clean Development Mechanism, Joint Implementation, and emissions trading among developed countries."
  category: "climate-science"
  related: ["cdm", "cer", "paris-agreement"]

# ─── L ────────────────────────────────────────────────────────────────────────

- term: "Leakage"
  slug: "leakage"
  definition: "An increase in greenhouse gas emissions outside the project boundary that occurs as a result of the project activity. Must be accounted for when calculating net emission reductions."
  category: "carbon-markets"
  related: ["emission-reductions", "monitoring"]

- term: "Location-Based Method"
  slug: "location-based-method"
  definition: "A Scope 2 accounting approach that uses the average emission factor of the local electricity grid to calculate emissions from purchased electricity, reflecting the physical reality of the grid."
  category: "ghg-accounting"
  related: ["market-based-method", "scope-2", "emission-factor"]

# ─── M ────────────────────────────────────────────────────────────────────────

- term: "Market-Based Method"
  slug: "market-based-method"
  definition: "A Scope 2 accounting approach that reflects specific electricity purchasing decisions such as renewable energy certificates (RECs) or power purchase agreements, allowing companies to claim lower emissions."
  category: "ghg-accounting"
  related: ["location-based-method", "scope-2", "rec"]

- term: "Materiality"
  slug: "materiality"
  definition: "The principle determining which sustainability topics are significant enough to warrant disclosure. A topic is material if it could influence decisions of stakeholders or represents significant impacts."
  category: "reporting-standards"
  related: ["double-materiality", "esrs"]

- term: "Monitoring"
  slug: "monitoring"
  definition: "Systematic measurement and recording of project data to track emission reductions, verify performance, and ensure compliance with methodology requirements."
  category: "carbon-markets"
  related: ["mrv", "crediting-period"]

- term: "MRV"
  slug: "mrv"
  definition: "Monitoring, Reporting, and Verification - the process of systematically tracking project performance, documenting results, and having them independently verified."
  category: "carbon-markets"
  related: ["monitoring", "vvb"]

# ─── N ────────────────────────────────────────────────────────────────────────

- term: "Natural Capital"
  slug: "natural-capital"
  definition: "The stock of natural assets - geology, soil, water, air, and living organisms - that provides ecosystem services underpinning economic activity and human wellbeing."
  category: "sustainability"
  related: ["biodiversity", "ecosystem-services", "tnfd"]

- term: "NDC"
  slug: "ndc"
  definition: "Nationally Determined Contribution - a country's self-defined climate pledge under the Paris Agreement, outlining its emission reduction targets and adaptation plans. Each successive NDC must be more ambitious."
  category: "climate-science"
  related: ["paris-agreement", "cop", "article-6"]

- term: "Negative Screening"
  slug: "negative-screening"
  definition: "An investment strategy that deliberately excludes companies or sectors conflicting with investor values or sustainability criteria, such as tobacco, weapons, or fossil fuels."
  category: "climate-finance"
  related: ["esg-integration", "impact-investing"]

- term: "Net Zero"
  slug: "net-zero"
  definition: "Achieving a balance between greenhouse gas emissions produced and greenhouse gas emissions removed from the atmosphere, resulting in no net increase."
  category: "climate-science"
  related: ["carbon-sequestration", "emission-reductions", "sbti"]

# ─── O ────────────────────────────────────────────────────────────────────────

- term: "Operational Control"
  slug: "operational-control"
  definition: "A GHG Protocol consolidation approach where an organization accounts for 100% of emissions from operations over which it has full authority to introduce and implement operating policies."
  category: "ghg-accounting"
  related: ["ghg-protocol", "scope-1"]

- term: "Organizational Boundary"
  slug: "organizational-boundary"
  definition: "The set of entities, operations, and facilities included in an organization's GHG inventory. Determined using either the equity share or control (financial or operational) approach."
  category: "ghg-accounting"
  related: ["operational-control", "ghg-protocol"]

# ─── P ────────────────────────────────────────────────────────────────────────

- term: "PAI"
  slug: "pai"
  definition: "Principal Adverse Impacts - the negative effects that investment decisions have on sustainability factors such as climate, environment, workers, and human rights. Required disclosure under SFDR."
  category: "reporting-standards"
  related: ["sfdr", "dnsh"]

- term: "Paris Agreement"
  slug: "paris-agreement"
  definition: "The 2015 international accord where 196 countries committed to limiting global warming to well below 2C above pre-industrial levels, with efforts to limit to 1.5C. Establishes NDCs and Article 6 carbon markets."
  category: "climate-science"
  related: ["ndc", "cop", "article-6", "1-5c-pathway"]

- term: "PCAF"
  slug: "pcaf"
  definition: "Partnership for Carbon Accounting Financials - the global standard for measuring and reporting financed emissions across financial institutions, covering lending, investment, and insurance portfolios."
  category: "climate-finance"
  related: ["financed-emissions", "attribution-factor", "scope-3"]

- term: "Permanence"
  slug: "permanence"
  definition: "The requirement that carbon stored or emission reductions achieved by a project are long-lasting and not reversed. Particularly relevant for forestry and land-use projects."
  category: "carbon-markets"
  related: ["carbon-sequestration", "buffer-pool"]

- term: "Physical Risk"
  slug: "physical-risk"
  definition: "Direct financial risk from climate change impacts, split into acute (extreme weather events like floods and storms) and chronic (long-term shifts like sea-level rise and temperature increase)."
  category: "climate-finance"
  related: ["transition-risk", "climate-scenario-analysis", "tcfd"]

- term: "PRI"
  slug: "pri"
  definition: "Principles for Responsible Investment - a UN-supported initiative (launched 2006) establishing six principles for incorporating ESG factors into investment analysis, decision-making, and ownership practices."
  category: "climate-finance"
  related: ["esg-integration", "fiduciary-duty"]

- term: "Pyrolysis"
  slug: "pyrolysis"
  definition: "Thermochemical decomposition of biomass entirely without oxygen, producing biochar, bio-oil, and syngas. The primary production process for stable biochar used in carbon removal projects."
  category: "carbon-markets"
  related: ["biochar", "carbon-sequestration"]

# ─── R ────────────────────────────────────────────────────────────────────────

- term: "REC"
  slug: "rec"
  definition: "Renewable Energy Certificate - a tradable instrument certifying that one MWh of electricity was generated from a renewable source. Used in market-based Scope 2 accounting."
  category: "ghg-accounting"
  related: ["market-based-method", "scope-2"]

- term: "REDD+"
  slug: "redd-plus"
  definition: "Reducing Emissions from Deforestation and Forest Degradation - a UN framework that creates financial incentives for developing countries to reduce emissions from forest loss and enhance forest carbon stocks."
  category: "carbon-markets"
  related: ["afolu", "carbon-sequestration", "carbon-credit"]

# ─── S ────────────────────────────────────────────────────────────────────────

- term: "SASB"
  slug: "sasb"
  definition: "Sustainability Accounting Standards Board - develops sector-specific materiality maps identifying which sustainability issues are financially material for 77 industries. Now part of the ISSB."
  category: "reporting-standards"
  related: ["issb", "materiality"]

- term: "SBTi"
  slug: "sbti"
  definition: "Science Based Targets initiative - an independent body (partnership of CDP, UN Global Compact, WRI, and WWF) that validates corporate emission reduction targets as consistent with limiting warming to 1.5C."
  category: "climate-science"
  related: ["1-5c-pathway", "net-zero", "scope-1"]

- term: "Science-Based Targets"
  slug: "science-based-targets"
  definition: "Corporate GHG reduction targets mathematically aligned with the decarbonization pathways required to limit global warming to 1.5C. Validated by the SBTi using methods like Absolute Contraction and Sectoral Decarbonization."
  category: "climate-science"
  related: ["sbti", "1-5c-pathway", "decarbonization"]

- term: "Scope 1 Emissions"
  slug: "scope-1"
  definition: "Direct GHG emissions from sources owned or controlled by an organization, such as fuel combustion in boilers, vehicles, or manufacturing processes."
  category: "ghg-accounting"
  related: ["scope-2", "scope-3", "ghg"]

- term: "Scope 2 Emissions"
  slug: "scope-2"
  definition: "Indirect GHG emissions from the generation of purchased electricity, steam, heating, and cooling consumed by the reporting organization."
  category: "ghg-accounting"
  related: ["scope-1", "scope-3", "emission-factor", "location-based-method"]

- term: "Scope 3 Emissions"
  slug: "scope-3"
  definition: "All other indirect GHG emissions in a company's value chain, including both upstream (supply chain) and downstream (product use and disposal) emissions. Organized into 15 categories by the GHG Protocol."
  category: "ghg-accounting"
  related: ["scope-1", "scope-2", "value-chain", "financed-emissions"]

- term: "SDGs"
  slug: "sdgs"
  definition: "Sustainable Development Goals - 17 interconnected goals adopted by all UN member states in 2015 as a blueprint for peace and prosperity for people and the planet."
  category: "sustainability"
  related: ["esg", "co-benefits"]

- term: "SFDR"
  slug: "sfdr"
  definition: "Sustainable Finance Disclosure Regulation - EU regulation requiring financial market participants to disclose how they integrate sustainability risks and impacts. Classifies funds as Article 6 (grey), Article 8 (light green), or Article 9 (dark green)."
  category: "reporting-standards"
  related: ["eu-taxonomy", "pai", "greenwashing"]

- term: "Shadow Carbon Price"
  slug: "shadow-carbon-price"
  definition: "An internal price that companies apply to projected future carbon costs when evaluating investment decisions, reflecting anticipated regulatory and market pricing of emissions."
  category: "climate-finance"
  related: ["carbon-pricing", "transition-risk"]

- term: "Social Bond"
  slug: "social-bond"
  definition: "A fixed-income instrument with proceeds designated for projects addressing social challenges such as affordable housing, healthcare, education, and food security."
  category: "climate-finance"
  related: ["green-bond", "sustainability-linked-bond"]

- term: "Soil Organic Carbon (SOC)"
  slug: "soc"
  definition: "Carbon stored in soil from decomposed plant and animal matter. The primary carbon pool tracked in agricultural carbon projects, measured in tonnes of carbon per hectare."
  category: "carbon-markets"
  related: ["carbon-sequestration", "afolu"]

- term: "Stakeholder Engagement"
  slug: "stakeholder-engagement"
  definition: "The process of actively consulting with individuals and groups affected by or interested in a company's activities, including employees, communities, investors, and civil society."
  category: "esg"
  related: ["double-materiality", "due-diligence"]

- term: "Stationary Combustion"
  slug: "stationary-combustion"
  definition: "The burning of fuels in fixed equipment such as boilers, furnaces, and generators to produce heat, steam, or electricity. A major source of Scope 1 emissions."
  category: "ghg-accounting"
  related: ["scope-1", "emission-factor", "fugitive-emissions"]

- term: "Stranded Assets"
  slug: "stranded-assets"
  definition: "Investments that lose economic value before the end of their expected useful life due to changes in regulation, technology, or market behavior - such as coal plants made unviable by carbon pricing."
  category: "climate-finance"
  related: ["transition-risk", "carbon-pricing"]

- term: "Sustainability-Linked Bond"
  slug: "sustainability-linked-bond"
  definition: "A bond whose financial characteristics (typically coupon rate) are tied to the issuer's achievement of predefined ESG performance targets, with penalties for missing them."
  category: "climate-finance"
  related: ["green-bond", "social-bond"]

# ─── T ────────────────────────────────────────────────────────────────────────

- term: "TCFD"
  slug: "tcfd"
  definition: "Task Force on Climate-related Financial Disclosures - a framework (established 2017 by the FSB) providing standardized recommendations for climate-related disclosure organized into governance, strategy, risk management, and metrics and targets."
  category: "reporting-standards"
  related: ["ifrs-s2", "issb", "climate-scenario-analysis"]

- term: "TNFD"
  slug: "tnfd"
  definition: "Taskforce on Nature-related Financial Disclosures - a framework for organizations to report and act on evolving nature-related risks and opportunities, modeled on the TCFD structure."
  category: "reporting-standards"
  related: ["biodiversity", "natural-capital", "tcfd"]

- term: "Transition Risk"
  slug: "transition-risk"
  definition: "Financial risk arising from the shift to a low-carbon economy, including policy changes (carbon taxes), technology disruption (renewables), market shifts (changing consumer preferences), and reputational impacts."
  category: "climate-finance"
  related: ["physical-risk", "climate-scenario-analysis", "stranded-assets"]

# ─── V ────────────────────────────────────────────────────────────────────────

- term: "Value Chain"
  slug: "value-chain"
  definition: "The full range of activities and entities involved in creating and delivering a product or service, including upstream suppliers and downstream customers. Central to Scope 3 emissions accounting."
  category: "ghg-accounting"
  related: ["scope-3", "due-diligence"]

- term: "VCS"
  slug: "vcs"
  definition: "Verified Carbon Standard - Verra's flagship carbon crediting program and the world's most widely used voluntary carbon standard, certifying projects across renewable energy, forestry, agriculture, and more."
  category: "carbon-markets"
  related: ["vcu", "vvb", "carbon-credit"]

- term: "VCU"
  slug: "vcu"
  definition: "Verified Carbon Unit - a carbon credit issued by Verra's Verified Carbon Standard (VCS) program, representing one tonne of verified GHG emission reductions or removals."
  category: "carbon-markets"
  related: ["carbon-credit", "vvb", "vcs"]

- term: "Voluntary Carbon Market (VCM)"
  slug: "vcm"
  definition: "A decentralized market where companies and individuals voluntarily purchase carbon credits to offset their emissions, operating independently of compliance carbon markets and national accounting."
  category: "carbon-markets"
  related: ["carbon-credit", "vcs", "article-6"]

- term: "VVB"
  slug: "vvb"
  definition: "Validation/Verification Body - an independent third-party auditor accredited to assess and confirm that a carbon project meets the requirements of a given standard."
  category: "carbon-markets"
  related: ["mrv", "vcu"]

# ─── W ────────────────────────────────────────────────────────────────────────

- term: "WACI"
  slug: "waci"
  definition: "Weighted Average Carbon Intensity - a portfolio-level metric that normalizes GHG emissions by revenue across holdings, allowing comparison of carbon exposure between different portfolios."
  category: "climate-finance"
  related: ["financed-emissions", "scope-1", "scope-2"]

- term: "1.5C Pathway"
  slug: "1-5c-pathway"
  definition: "A decarbonization trajectory consistent with a 50% probability of limiting global temperature rise to 1.5C above pre-industrial levels. Requires roughly halving global emissions by 2030 and reaching net zero by 2050."
  category: "climate-science"
  related: ["paris-agreement", "carbon-budget", "sbti", "net-zero"]
