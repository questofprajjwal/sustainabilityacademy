- question: "When choosing a base year for Scope 2, the guidance recommends selecting a year in which:"
  options:
    - "Only the location-based total was calculated, for simplicity"
    - "Both market-based and location-based data are available, so progress can be tracked across both methods"
    - "Emissions were highest, to maximise the apparent reduction achieved"
    - "The company first began purchasing renewable energy"
  answer: 1
  explanation: "The Scope 2 Guidance recommends selecting a base year where both location-based and market-based data are available. This enables like-for-like comparison over time across both methods. If only location-based data exists for the base year, companies must disclose this and state that location-based data was used as a proxy."

- question: "A company sets a Scope 2 absolute reduction target. Why is the market-based method generally the recommended basis for goal tracking when certificates and contractual instruments are used?"
  options:
    - "The market-based method always produces a lower total than the location-based method"
    - "Because the market-based total directly and immediately reflects procurement decisions, creating coherence between what the company commits to do and what it measures"
    - "Because regulators require market-based targets for companies in certificate-enabled markets"
    - "The location-based method is too complex for target tracking purposes"
  answer: 1
  explanation: "The market-based method directly reflects contractual procurement choices. When a company's goal is to procure renewable energy, the market-based method shows the outcome of that procurement. This coherence between strategy (make specific procurement choices) and measurement (market-based total) makes it the preferred basis for Scope 2 targets."

- question: "A manufacturing company had base year scope 1 and scope 2 emissions of 120,000 tCO2e. It has set an absolute reduction target of 30% by 2030. What is its maximum allowable annual emissions figure in 2030?"
  options:
    - "36,000 tCO2e"
    - "84,000 tCO2e"
    - "90,000 tCO2e"
    - "120,000 tCO2e"
  answer: 1
  explanation: "A 30% reduction means the company must emit no more than 70% of its base year figure. 120,000 tCO2e × 0.70 = 84,000 tCO2e. The company must keep emissions at or below 84,000 tCO2e in 2030."

- question: "Why are long-term PPAs with projects not yet built considered a more impactful form of renewable energy procurement than purchasing unbundled certificates from existing facilities?"
  options:
    - "Long-term PPAs are cheaper per MWh than unbundled certificates"
    - "Long-term PPAs provide the revenue certainty that project developers and lenders need to finance construction, directly enabling new renewable capacity to be built"
    - "Unbundled certificates from existing facilities do not meet the Scope 2 Quality Criteria"
    - "Long-term PPAs convey higher-quality certificates with better vintage matching"
  answer: 1
  explanation: "A 15-year PPA with a new solar facility that hasn't been built yet provides the long-term revenue certainty developers and lenders need to finance construction. This is a more direct contribution to new supply development than purchasing certificates from existing facilities, which simply reallocates existing attributes."

- question: "What does temporal matching in certificate procurement mean, and why does it strengthen a renewable energy claim?"
  options:
    - "Purchasing certificates only during business hours to match operational consumption"
    - "Ensuring the generation facility's construction date matches the procurement year"
    - "Matching certificate vintage to consumption at an hourly or monthly level, ensuring claimed generation corresponds to actual consumption patterns over time"
    - "Aligning certificate purchase dates with financial reporting periods"
  answer: 2
  explanation: "Temporal matching (hourly or monthly) ensures that claimed renewable generation corresponds to consumption patterns throughout the year — including during times when variable renewable sources like wind and solar may produce less. Annual matching allows a mismatch where, for example, wind certificates represent night generation while consumption peaks during the day."
