- question: "A facility consumed 2,000 MWh of electricity. It retired 800 I-RECs (each representing 1 MWh of renewable energy). For the market-based Scope 2 calculation, how should the remaining 1,200 MWh be treated?"
  options:
    - "Assign an emission factor of zero to all 2,000 MWh since I-RECs were purchased"
    - "Use the residual mix or grid average factor for the remaining 1,200 MWh"
    - "Exclude the remaining 1,200 MWh from the market-based total entirely"
    - "Average the zero-emission I-REC factor across all 2,000 MWh proportionally"
  answer: 1
  explanation: "Certificates only cover the MWh they represent. The 800 I-RECs zero out 800 MWh, but the remaining 1,200 MWh must use the next available factor in the market-based hierarchy - typically the residual mix factor or, if unavailable, the grid average factor."

- question: "Your client's electricity bill for a building with rooftop solar shows 350 MWh consumed. You know the building exported 50 MWh of solar-generated electricity back to the grid. What figure should you use as Scope 2 activity data?"
  options:
    - "350 MWh, as shown on the bill"
    - "300 MWh, subtracting the solar exports"
    - "400 MWh, adding back the exports to get gross grid purchases"
    - "350 MWh for location-based and 300 MWh for market-based"
  answer: 2
  explanation: "The bill shows net consumption (grid purchases minus solar exports). For Scope 2, you need gross purchases from the grid - the total electricity drawn, before netting out exports. Since 350 MWh is the net figure and 50 MWh was exported, the gross grid purchases are 400 MWh."

- question: "When calculating location-based Scope 2 for a facility in Texas, which emission factor source should you prefer?"
  options:
    - "IEA national average factor for the United States"
    - "EPA eGRID subregional total output emission rate for the relevant subregion"
    - "The utility company's published fuel mix disclosure"
    - "The residual mix factor published by Green-e"
  answer: 1
  explanation: "The location-based method uses a geographic hierarchy: direct line factor first, then regional/subnational, then national. EPA eGRID subregional factors are the most geographically precise publicly available data for US grid electricity, making them the correct choice over the broader IEA national average. Utility fuel mix and residual mix factors belong to the market-based hierarchy, not location-based."
