- question: "A company-owned delivery truck making a customer delivery produces emissions classified as:"
  options:
    - "Scope 2, because the truck uses diesel purchased from a third party"
    - "Scope 3, because it is serving an external customer"
    - "Scope 1, because the truck is owned or controlled by the reporting organisation"
    - "Scope 1 for the fuel combustion and Scope 3 for vehicle maintenance"
  answer: 2
  explanation: "Scope 1 covers fuel combustion in vehicles owned or controlled by the reporting organisation. The key test is ownership or operational control, not the purpose of the trip. An employee driving their own car on company business is Scope 3."

- question: "For on-road vehicles, why are CH4 and N2O calculated using a distance-based equation (Equation 4) rather than a fuel-based equation?"
  options:
    - "Fuel consumption data is unavailable for on-road vehicles"
    - "CH4 and N2O from on-road vehicles are strongly influenced by vehicle type and emissions control technology, best represented by distance-based factors tied to model year"
    - "Distance-based factors are more conservative and produce higher reported emissions"
    - "The EPA requires distance-based calculations for all transport emissions"
  answer: 1
  explanation: "CH4 and N2O from on-road vehicles depend heavily on the type of catalytic converter and vehicle model year, not just fuel volume. Distance-based factors (Equation 4) correlated with vehicle type and model year capture this relationship better than fuel-based factors for these gases."

- question: "A company's truck fleet consumes 50,000 litres of diesel. Using an EPA CO2 emission factor of 2.68 kg CO2/litre, what are the CO2 emissions in metric tonnes?"
  options:
    - "13.4 tCO2"
    - "134 tCO2"
    - "1,340 tCO2"
    - "268 tCO2"
  answer: 1
  explanation: "50,000 litres × 2.68 kg CO2/litre = 134,000 kg CO2 ÷ 1,000 = 134 metric tonnes CO2."

- question: "A vehicle fleet operates on B20 fuel (20% biodiesel, 80% petroleum diesel). How should CO2 emissions be treated?"
  options:
    - "Apply the fossil diesel emission factor to the full 100% of fuel consumed"
    - "Apply no emission factor — biodiesel blends are carbon neutral"
    - "Calculate fossil CO2 from the 80% fossil portion (included in inventory) and report biomass CO2 from the 20% biodiesel separately"
    - "Use the weighted average of fossil diesel and biodiesel emission factors for the full volume"
  answer: 2
  explanation: "Fossil CO2 from the petroleum diesel portion is included in the inventory. CO2 from the biodiesel (biomass) portion is reported separately as biomass CO2 and excluded from the CO2-equivalent total. CH4 and N2O from both portions are included in the CO2e total."

- question: "What is the best source of distance data for calculating CH4 and N2O from on-road vehicles using Equation 4?"
  options:
    - "Fuel receipts converted to distance using fuel economy estimates"
    - "Employee self-reported estimates of trips taken"
    - "Odometer readings from vehicle operator logs or maintenance records"
    - "GPS data from navigation systems"
  answer: 2
  explanation: "Odometer readings from vehicle operator logs or maintenance records are the best direct source of vehicle-miles or vehicle-kilometers traveled. Fuel economy conversion is less accurate. Distance data should be in vehicle-miles/km, not passenger-miles."
