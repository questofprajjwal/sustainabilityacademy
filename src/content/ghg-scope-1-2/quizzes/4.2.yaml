- question: "The Scope 2 Guidance recommends disclosing the 'facility age' of a generation facility behind a certificate. Why is this useful to stakeholders?"
  options:
    - "Older facilities are excluded from the market-based method under Quality Criteria rules"
    - "It helps stakeholders assess whether procurement consists of attributes from established facilities or recently built projects, which relates to the incremental contribution to low-carbon supply"
    - "Facility age determines the GWP adjustment applied to the certificate emission factor"
    - "It is required to confirm eligibility for national renewable portfolio standards"
  answer: 1
  explanation: "Facility age disclosure helps stakeholders distinguish between certificates from long-established plants (which may not represent new investment in renewable energy) versus recently built projects (which represent incremental additions to low-carbon capacity). This is relevant to assessing the procurement's real-world impact on energy system decarbonisation."

- question: "In Germany and Japan, certain renewable energy facilities cannot issue voluntary energy attribute certificates. Why?"
  options:
    - "Their grid emission factors are already near zero, making certificates unnecessary"
    - "Generation receiving public subsidies (feed-in tariffs) must have attributes retired as a public benefit or cancelled, rather than being available for individual voluntary claims"
    - "These countries have not adopted the GHG Protocol Scope 2 Guidance"
    - "Voluntary certificates compete with mandatory ETS allowances in those markets"
  answer: 1
  explanation: "In Germany, facilities receiving feed-in tariff subsidies must retire attributes on behalf of all consumers collectively. In Japan, renewable electricity supported by feed-in tariffs cannot be issued as voluntary energy attribute certificates. Companies in these markets must disclose the subsidy receipt condition."

- question: "When a company claims certificates from a market where a supplier quota (renewable portfolio standard) exists, what should it disclose?"
  options:
    - "Nothing — supplier quotas are regulatory matters separate from voluntary reporting"
    - "The relationship between its claimed instruments and the supplier quota, such as whether the purchase is above and beyond the quota requirement"
    - "The total amount of the supplier's quota obligation in that jurisdiction"
    - "Confirmation that its certificates have been retired against the quota"
  answer: 1
  explanation: "If a supplier is already required by law to deliver renewable electricity, a consumer claiming that product may not be creating incremental demand beyond regulation. Disclosing whether the claimed instrument is above and beyond quota requirements, or overlaps with them, lets stakeholders assess the procurement's incremental impact."

- question: "In emissions-capped power sectors (like the EU ETS), what additional disclosure does the guidance recommend for voluntary renewable energy purchases?"
  options:
    - "Companies must surrender ETS allowances equal to the certificates claimed"
    - "Whether an allowance set-aside program exists and whether allowances have been retired alongside the voluntary certificates"
    - "The current allowance price in the relevant trading scheme"
    - "The total cap in the sector and the company's share of it"
  answer: 1
  explanation: "In capped power sectors, the degree to which voluntary renewable purchases reduce overall sector emissions depends on whether allowances are also retired. Companies should disclose whether a set-aside program is in place and whether allowances have been retired alongside their certificates, with any retired allowances reported in metric tonnes separately from the scopes."
