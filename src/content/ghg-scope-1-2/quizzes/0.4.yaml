- question: "Under the equity share approach, how does a company account for emissions from a joint venture in which it holds a 40 percent interest?"
  options:
    - "100 percent of emissions, because it is a controlling partner"
    - "0 percent, because it does not operate the facility"
    - "40 percent of emissions, proportional to its equity share"
    - "50 percent, since all JV partners split equally"
  answer: 2
  explanation: "Under the equity share approach, companies account for GHG emissions in proportion to their equity share. A 40 percent interest means 40 percent of the JV's emissions are reported, regardless of who operates the facility."

- question: "Under the operational control approach, a company accounts for what percentage of emissions from an operation where it has full operational control?"
  options:
    - "Its equity percentage, typically less than 100 percent"
    - "100 percent"
    - "50 percent, shared with its financial partner"
    - "Zero, because operational control is about physical management not GHG accounting"
  answer: 1
  explanation: "Under the operational control approach, a company accounts for 100 percent of emissions from operations it controls operationally, and 0 percent from operations where it has an interest but another party has operational control."

- question: "In the Holland Industries example, the BGB operation shows equity interest of 41.5% but operational control of 0%. What explains this?"
  options:
    - "Holland Industries owns less than 50 percent so it cannot include BGB"
    - "The partner Rearden has operational control, so Holland reports 0% under the operational control approach"
    - "BGB is a franchise and franchises are always excluded"
    - "The equity percentage is rounded down to zero for JVs"
  answer: 1
  explanation: "Holland America owns 50 percent of BGB (giving Holland Industries 41.5 percent indirectly), but the partner Rearden controls operations. Under the operational control approach, Holland Industries reports 0 percent. Under equity share, it reports 41.5 percent."

- question: "BP reports on an equity share basis while Royal Dutch/Shell reports on operational control. What does the GHG Protocol say about these different approaches?"
  options:
    - "Only equity share is acceptable for public reporting"
    - "Only operational control is acceptable for regulatory programs"
    - "Both approaches are valid; the key requirement is consistent, transparent application of the chosen approach"
    - "Companies must report both approaches and disclose the difference"
  answer: 2
  explanation: "Both approaches are valid under the GHG Protocol. BP's equity share approach aligns with its financial accounting and captures its full economic footprint. Shell's operational control approach aligns with its HSE monitoring guidelines. Consistent, transparent application is the key requirement."

- question: "How are leased assets typically treated under the operational control approach?"
  options:
    - "All leased assets are excluded — they belong to the lessor's inventory"
    - "All leases confer operational control to the lessee, so leased assets fall within the lessee's boundary"
    - "Leased assets are reported in Scope 3 regardless of the consolidation approach"
    - "Only capital (finance) leases are included; operating leases are always excluded"
  answer: 1
  explanation: "Under the operational control approach, leases generally confer operational control to the lessee or tenant. Therefore, energy consumed in leased spaces is reported in Scope 2 by the lessee. Exceptions must be documented and justified."
