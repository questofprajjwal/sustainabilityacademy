- question: "What is the correct hierarchy of emission factor preference, from most to least accurate?"
  options:
    - "IPCC defaults > National defaults > Site-specific fuel analysis > CEMS"
    - "CEMS > Site-specific fuel analysis > National default (EPA) > International default (IPCC)"
    - "National default (EPA) > CEMS > Site-specific fuel analysis > IPCC defaults"
    - "Site-specific fuel analysis > CEMS > National defaults > IPCC defaults"
  answer: 1
  explanation: "The hierarchy from most to least preferred is: CEMS (direct measurement) > site-specific fuel analysis > national default emission factors (e.g., EPA GHG Emission Factors Hub) > international default factors (IPCC). Always use the most specific data available."

- question: "Activity data quality Tier 4 (cost-based fuel estimation) is explicitly not recommended by EPA. Why?"
  options:
    - "Fuel costs are commercially confidential and cannot be used"
    - "Converting cost to physical units using average prices introduces large uncertainty due to price volatility"
    - "Tier 4 is reserved for regulatory reporting only"
    - "Cost data is only available annually, not monthly"
  answer: 1
  explanation: "Tier 4 estimates fuel consumption from cost by applying average fuel prices. Fuel prices are highly volatile, so this conversion introduces significant uncertainty. The EPA recommends contacting suppliers directly to obtain data in physical or energy units instead."

- question: "The Vauxhall Motors example about air travel calculations demonstrates which critical QA/QC principle?"
  options:
    - "That air travel should be excluded from Scope 1 inventories"
    - "That even simple calculations require explicit assumption checks — using one-way instead of round-trip distance would produce a 50% undercount"
    - "That employee travel is always a Scope 3 category"
    - "That third-party data from travel agencies is unreliable"
  answer: 1
  explanation: "Vauxhall's review found that round-trip distance, not one-way distance, must be used for air travel. This error, if uncaught, would have reported emissions 50 percent below the actual value. The lesson: explicit assumption checking is essential even for seemingly simple calculations."

- question: "An Inventory Management Plan (IMP) should be created to:"
  options:
    - "Set the company's GHG reduction targets and timelines"
    - "Record all boundary decisions, source identification, methodologies, data sources, emission factors, assumptions, and QA/QC procedures for each source category"
    - "Report publicly disclosed GHG emissions to stakeholders"
    - "Track progress against science-based targets year by year"
  answer: 1
  explanation: "An IMP is the central document recording all inventory decisions: boundary settings, emission source lists, calculation methodologies, activity data sources, emission factors (with version dates), assumptions, and QA/QC results. It makes the inventory verifiable and ensures methodology survives personnel changes."

- question: "What are the three most common errors in Scope 1 inventories according to the EPA guidance?"
  options:
    - "Wrong base year selection, using LHV instead of HHV, and reporting in short tons"
    - "Missing sources, using the wrong emission factor tier, and unit conversion errors"
    - "Overcounting fugitive emissions, undercounting mobile sources, and omitting process emissions"
    - "Failing to report biomass CO2 separately, double-counting leased assets, and mixing scopes"
  answer: 1
  explanation: "The three most common Scope 1 errors are: (1) missing sources — equipment not identified within the boundary; (2) wrong emission factor tier — e.g., using IPCC defaults when EPA factors apply; (3) unit conversion errors — e.g., confusing LHV and HHV or short tons with metric tonnes."
