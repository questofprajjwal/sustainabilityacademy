- question: "When is a company required to report BOTH a location-based and a market-based Scope 2 total?"
  options:
    - "Only if the company's total Scope 2 emissions exceed 10,000 tCO2e"
    - "When it has any operations in markets that provide contractual instruments, the dual reporting requirement applies to the entire corporate inventory"
    - "Only if the company has purchased renewable energy certificates"
    - "Only for companies headquartered in the EU or North America"
  answer: 1
  explanation: "The dual reporting requirement applies at the corporate inventory level. If a multi-regional company has even one facility in a market where contractual instruments exist (EU, US, Australia, Japan, India, and others), it must report both totals for the entire inventory."

- question: "How many Scope 2 Quality Criteria must a contractual instrument meet to be used in a market-based calculation?"
  options:
    - "Three (GHG emission rate, uniqueness, and retirement)"
    - "Five (GHG rate, uniqueness, retirement, vintage, and market boundaries)"
    - "Eight criteria covering GHG rate, uniqueness, retirement, vintage, market boundaries, supplier factors, direct contracts, and residual mix"
    - "Two (it must be independently certified and it must be retired)"
  answer: 2
  explanation: "The Scope 2 Guidance establishes eight Quality Criteria. An instrument must: (1) convey GHG emission rates, (2) ensure unique claims, (3) be retired, (4) match vintage to consumption period, (5) come from the same market, (6) meet supplier emission factor requirements, (7) convey sole contractual rights if no certificates exist, and (8) have residual mix available or disclose its absence."

- question: "Criterion 4 (vintage matching) of the Scope 2 Quality Criteria requires that the instrument:"
  options:
    - "Be issued within the calendar year of energy consumption only"
    - "Be issued and redeemed as close as possible to the period of consumption, ideally from the reporting period or within 6 months prior or 3 months after"
    - "Come from a facility built within the last 5 years"
    - "Match the generation technology to the energy consumed (wind certificates for wind energy, solar for solar)"
  answer: 1
  explanation: "Criterion 4 (vintage) requires that the certificate's generation date match the consumption period as closely as possible. The guidance indicates certificates should ideally represent energy generated in the reporting period, or up to 6 months prior, or up to 3 months after."

- question: "Criterion 5 (market boundaries) specifies that contractual instruments must be:"
  options:
    - "Certified by an internationally recognised third party such as Green-e or EKOenergy"
    - "Sourced from the same geographic market in which the reporting entity's electricity-consuming operations are located"
    - "From a country with an established national certificate registry"
    - "Purchased directly from the generator, not through a broker"
  answer: 1
  explanation: "Criterion 5 requires that instruments come from the same market where the consuming operations are located. A market is a geographical area with a common regulatory authority and certificate trading system. This prevents a company from applying certificates from one region to operations in a different region."

- question: "The dual reporting requirement means the location-based and market-based totals should:"
  options:
    - "Be added together to get a comprehensive total for sustainability reporting"
    - "Be averaged to produce a single representative Scope 2 figure"
    - "Be reported separately, labelled by method — they must not be added together or netted"
    - "Be combined only when the location-based result is higher than the market-based result"
  answer: 2
  explanation: "The two totals represent separate ways of allocating generation emissions and serve different analytical purposes. They must be reported separately with clear labelling. Combining them would produce a meaningless hybrid figure that answers neither question they are designed to address."
