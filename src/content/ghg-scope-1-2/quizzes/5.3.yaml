- question: "What is the key difference between internal QA/QC and external verification?"
  options:
    - "Internal QA/QC covers Scope 1; external verification covers Scope 2 and 3"
    - "Internal QA/QC is conducted by the company itself to prevent and detect errors; external verification is conducted by an independent party to provide third-party assurance to external stakeholders"
    - "Internal QA/QC is voluntary; external verification is mandatory for all companies"
    - "External verification assesses only the completeness of the inventory; internal QA/QC assesses only accuracy"
  answer: 1
  explanation: "Internal QA/QC is the company's own process to prevent and detect errors. External verification is conducted by an independent third party. Both are valuable — strong internal processes make external verification more efficient and less costly."

- question: "Limited assurance (negative assurance) verification means the verifier:"
  options:
    - "Positively concludes the inventory is free from material misstatement after site visits and detailed testing"
    - "Concludes that nothing has come to their attention indicating the inventory is materially misstated, based on a less intensive review"
    - "Provides assurance only on the Scope 1 figures, not Scope 2"
    - "Issues a conditional opinion subject to management's corrections"
  answer: 1
  explanation: "Limited assurance ('review' engagement) is less intensive, typically desk-based. The conclusion is negative: nothing has come to attention indicating material misstatement. Reasonable assurance is more intensive (site visits, data testing) and positively concludes the inventory is free from material misstatement — analogous to a financial audit."

- question: "During risk assessment, what factor does a verifier consider when prioritising which parts of the inventory to examine most closely?"
  options:
    - "The size of the company's market capitalisation"
    - "The contribution of each component to total emissions, the complexity of data collection, and the risk of material misstatement"
    - "Whether the company has been verified in previous years"
    - "The number of emission source categories in the inventory"
  answer: 1
  explanation: "Verifiers assess risk of material discrepancy across all components: the contribution to total emissions, data collection complexity, management approach to GHG monitoring, IT system complexity, meter calibration, data aggregation across sources, and other factors. High-contribution, high-complexity sources receive the most scrutiny."

- question: "PricewaterhouseCoopers noted that GHG data for 1990 is often too unreliable to provide a verifiable base year. What does this illustrate?"
  options:
    - "Companies should always use the most recent year as their base year"
    - "Base year data quality is critical — a base year that cannot be verified undermines the credibility of all subsequent performance comparisons"
    - "PwC recommends against using any pre-2000 base year for any company"
    - "Historical data is never accurate enough for GHG inventory purposes"
  answer: 1
  explanation: "The PwC observation illustrates that a base year must have reliable, verifiable underlying data. If base year data cannot be verified, the entire tracking of emissions over time against that base year lacks credibility. This is why companies must choose base years with available and verifiable data."

- question: "Before issuing a final verification opinion, what must happen if the verifier identifies material errors?"
  options:
    - "The errors are footnoted in the verification report but the opinion is still issued"
    - "The company corrects all material errors, or the verifier may be unable to issue an unqualified opinion"
    - "The errors are adjusted by the verifier directly in the company's data"
    - "The report is delayed by one year while the company gathers corrected data"
  answer: 1
  explanation: "All material errors, considered individually or in aggregate, must be resolved before final sign-off. If agreement on corrections cannot be reached, the verifier may be unable to issue an unqualified opinion. The verification process should be viewed as a vehicle for continuous improvement, not just a compliance exercise."
