- question: "Under the GHG Protocol Corporate Standard, Scope 1 and Scope 2 emissions must be reported gross of any GHG trades. This means:"
  options:
    - "Companies add their purchased offsets to reported emissions to show gross exposure"
    - "Purchased offsets or allowances do not reduce the reported physical inventory; they are disclosed separately as optional information"
    - "Only net emissions after trading are reported, with the trades disclosed in footnotes"
    - "Trading is prohibited for companies reporting under the GHG Protocol"
  answer: 1
  explanation: "The standard requires Scope 1 and Scope 2 totals to be reported gross — representing actual physical emissions from the company's operations. Purchased offsets, carbon credits, or allowances are disclosed separately as optional information. They do not reduce what appears in the scope totals."

- question: "Intensity ratios are optional but widely used. Which of the following is an example of a GHG intensity ratio?"
  options:
    - "Total Scope 1 emissions for the year expressed in tCO2e"
    - "Percentage change in absolute emissions compared to the base year"
    - "Tonnes CO2e per tonne of product produced, showing emissions efficiency per unit of output"
    - "The number of emission sources included in the inventory"
  answer: 2
  explanation: "An intensity ratio expresses GHG impact per unit of output or activity — such as tCO2e/tonne of product, tCO2e/MWh generated, or tCO2e/$ revenue. A declining intensity ratio shows performance improvement independently of changes in production scale."

- question: "Which of the following is a MANDATORY disclosure in a public GHG report under the Corporate Standard?"
  options:
    - "Scope 3 emissions from employee commuting"
    - "Details of any offset projects purchased"
    - "Total Scope 1 and Scope 2 emissions reported separately, with the six Kyoto gases listed individually in both mass and CO2e"
    - "A comparison of the company's intensity against industry sector averages"
  answer: 2
  explanation: "Mandatory disclosures include: total Scope 1 and 2 emissions reported independently of any GHG trades, emissions data for each scope separately, all six Kyoto gases in metric tonnes and CO2e, base year and recalculation policy, biomass CO2 separately, methodologies used, and specific exclusions with justification."

- question: "The Carbon Disclosure Project (CDP) and GRI Standards relate to the GHG Protocol Corporate Standard in what way?"
  options:
    - "CDP and GRI are competing standards that companies must choose between"
    - "Both frameworks reference or align closely with the GHG Protocol methodology and require disclosure of gross Scope 1 and 2 emissions"
    - "CDP requires Scope 1 only; GRI requires Scope 2 only"
    - "CDP and GRI are restricted to financial institutions and do not require GHG data"
  answer: 1
  explanation: "CDP requests detailed responses aligned with the GHG Protocol, including scopes 1, 2, and significant Scope 3, targets, and strategies. GRI Standards directly reference GHG Protocol methodology and require disclosure of gross Scope 1 and Scope 2 emissions with methodology references."

- question: "What must be true for an abbreviated or summary GHG report to claim conformance with the GHG Protocol Corporate Standard?"
  options:
    - "The abbreviated report must include all required information in condensed form"
    - "It must provide a link or reference to a publicly available full report containing all required information"
    - "An abbreviated report cannot claim conformance — full disclosure is always required"
    - "It must be verified by a third party before publication"
  answer: 1
  explanation: "The standard requires that even summary or abbreviated reports must provide a link or reference to a full, publicly available report containing all required information. The full data must be accessible; not every document needs to be exhaustive."
