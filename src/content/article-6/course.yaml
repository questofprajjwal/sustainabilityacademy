id: article-6
title: "Article 6 of the Paris Agreement"
subtitle: "International carbon markets, ITMOs, and cooperative climate action"
description: "A comprehensive course on Article 6 of the Paris Agreement -- the international framework for carbon trading, covering the bilateral ITMO mechanism (6.2), the UN-supervised carbon market (6.4), non-market cooperation (6.8), corresponding adjustments, NDC accounting, and the Glasgow Rulebook."
icon: "🌐"
color: blue
status: published
category: markets
estimatedHours: 1
modules:
