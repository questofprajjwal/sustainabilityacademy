        title: "The Paris Agreement and Carbon Markets"
        duration: "35 min"
        vmRef: "Paris Agreement, Article 6; UNFCCC Background Documentation"
      - id: "0.2"
        title: "The Three Tracks: 6.2, 6.4, and 6.8"
        duration: "30 min"
        vmRef: "Paris Agreement Article 6.2, 6.4, 6.8; CATF Overview 2024"
      - id: "0.3"
        title: "Nationally Determined Contributions and NDC Accounting"
        duration: "35 min"
        vmRef: "Paris Agreement Article 4; Article 6.2 Reference Manual"

