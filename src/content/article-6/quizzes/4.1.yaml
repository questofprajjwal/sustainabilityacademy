- question: "A carbon credit is described as 'additional' if which of the following conditions is met?"
  options:
    - "The project is located in a country with a population below 50 million"
    - "The emission reduction or removal would not have occurred without the carbon market incentive -- i.e., it would not have happened in the baseline scenario"
    - "The credit has been independently verified by an accredited auditor"
    - "The project generates more than 100,000 credits per crediting period"
  answer: 1
  explanation: "Additionality is the principle that the emission reduction or removal must be caused by the carbon market. If the project would have happened anyway -- because it was commercially viable without carbon revenue, legally mandated, or already planned -- the credits are not additional. They represent reductions that would have occurred regardless of the market, making them climate-worthless. Additionality is tested through counterfactual analysis of the baseline scenario."

- question: "Investigations into the voluntary carbon market have found that what fraction of examined credits appeared to represent genuine, additional emission reductions?"
  options:
    - "More than 80%"
    - "Approximately 50%"
    - "Fewer than 16%"
    - "Around 35%"
  answer: 2
  explanation: "Multiple independent investigations -- by academic researchers and investigative journalists -- found that fewer than 16% of examined voluntary carbon credits appeared to represent real, additional emission reductions. The majority were found to have overstated baselines, questionable additionality, or methodological weaknesses that inflated credit quantities. This finding has driven major reform efforts in the VCM and reinforced demand for the higher-integrity standards of Article 6."

- question: "What does 'double counting' mean in the context of carbon credits, and which Article 6 mechanism is specifically designed to prevent the most common form?"
  options:
    - "When a project developer counts the same credit twice in their project documentation; prevented by independent verification"
    - "When the same emission reduction is credited in both the host country's NDC progress and the buyer's climate claim; prevented by the corresponding adjustment requirement"
    - "When two different projects in the same country apply for credits for the same activity; prevented by registry serial numbers"
    - "When a country issues too many credits in one year; prevented by the OMGE cancellation"
  answer: 1
  explanation: "The most significant form of double counting occurs when the host country counts a reduction in its NDC progress while the buyer simultaneously counts the same reduction in their own climate claim. This is prevented by the corresponding adjustment (CA): when a credit is transferred internationally, the host country must add the transferred reduction back to its own NDC accounts, ensuring it is counted only once globally. Registry controls prevent double issuance and double claiming."

- question: "What is 'hot air' in the context of carbon markets, and what Paris Agreement feature helps reduce this risk?"
  options:
    - "Credits generated by combustion projects; reduced by improved combustion efficiency standards"
    - "Credits from REDD+ projects that are later reversed by forest fires; reduced by buffer pool requirements"
    - "Credits generated when a country's NDC target is less ambitious than its business-as-usual trajectory, allowing it to sell reductions that would have occurred anyway; reduced by the Paris Agreement's ambition ratchet"
    - "Speculative credit purchases that inflate prices without delivering reductions; reduced by registry transparency requirements"
  answer: 2
  explanation: "Hot air refers to a situation where a country sets an NDC target above its likely business-as-usual emissions trajectory -- making it easy to 'meet' the target without taking any real action -- and then sells the difference as carbon credits. These credits represent no real climate benefit. The Paris Agreement's ambition ratchet (Article 4's requirement that each successive NDC be more ambitious) is intended to narrow the gap between targets and business-as-usual over time, reducing hot air risk as NDC cycles progress."

- question: "What does MRV stand for, and what is the role of independent verification within the MRV process?"
  options:
    - "Monitoring, Reporting, Verification; independent verification confirms that monitored data supports the claimed reductions before credits are issued"
    - "Measurement, Registration, Validation; independent verification registers the project in the central registry"
    - "Monitoring, Registry, Validation; independent verification sets the baseline for the project"
    - "Methodology, Reporting, Verification; independent verification approves the methodology used by the project"
  answer: 0
  explanation: "MRV stands for Monitoring, Reporting, and Verification. Monitoring is the ongoing data collection during project implementation. Reporting compiles that data into a structured monitoring report at the end of a crediting period. Verification is the independent audit of the monitoring report by an accredited third-party auditor, who confirms whether the reported reductions are fairly presented and meet methodology requirements. The verification opinion is the basis for credit issuance -- without independent verification, self-reported reductions cannot be credibly credited."
