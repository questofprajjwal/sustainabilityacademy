id: esg-benchmarking
title: "ESG Peer Benchmarking"
subtitle: "How consultants assess and compare ESG performance across companies"
description: "A practitioner-focused course on ESG peer benchmarking from a consultant's perspective. Covers leading rating methodologies from MSCI and Sustainalytics, the CDP scoring system, GRI reporting standards, and the full suite of environmental, social and governance KPIs used to compare companies against their peers. Includes guidance on defining peer groups, collecting data, and presenting findings to clients."
icon: "📊"
color: orange
status: published
category: esg
estimatedHours: 9
modules:
  - id: 0
    title: "Foundations of ESG Benchmarking"
    subtitle: "Why benchmarking matters and how to frame the work"
    icon: "🧭"
    color: orange
    lessons:
      - id: "0.1"
        title: "Why ESG Peer Benchmarking Matters"
        duration: "30 min"
        vmRef: "MSCI ESG Ratings Methodology Section 1; Sustainalytics ESG Risk Ratings Introduction"
      - id: "0.2"
        title: "The Major ESG Rating Agencies and Their Approaches"
        duration: "35 min"
        vmRef: "MSCI ESG Ratings Methodology Section 2; Sustainalytics ESG Risk Ratings Building Blocks"

  - id: 1
    title: "MSCI ESG Ratings"
    subtitle: "3 pillars, 33 key issues, and an industry-adjusted final score"
    icon: "📈"
    color: orange
    lessons:
      - id: "1.1"
        title: "MSCI's Pillars, Themes and 33 Key Issues"
        duration: "40 min"
        vmRef: "MSCI ESG Ratings Methodology Sections 2.1, 3.1"
      - id: "1.2"
        title: "Exposure and Management Scores"
        duration: "40 min"
        vmRef: "MSCI ESG Ratings Methodology Sections 3.2, 3.3"
      - id: "1.3"
        title: "The WAKIS, Industry Adjustment and Final Rating"
        duration: "35 min"
        vmRef: "MSCI ESG Ratings Methodology Sections 2.3, 3.5, 3.6"

  - id: 2
    title: "Sustainalytics ESG Risk Ratings"
    subtitle: "Unmanaged risk, exposure, management and the MEI framework"
    icon: "⚠️"
    color: orange
    lessons:
      - id: "2.1"
        title: "The Unmanaged Risk Concept and Material ESG Issues"
        duration: "40 min"
        vmRef: "Sustainalytics ESG Risk Ratings v3.1.1 - Introduction, Building Block 1"
      - id: "2.2"
        title: "Exposure Dimension: Subindustry and Beta Factors"
        duration: "40 min"
        vmRef: "Sustainalytics ESG Risk Ratings v3.1.1 - First Dimension: Exposure"
      - id: "2.3"
        title: "Management Dimension and Risk Categories"
        duration: "35 min"
        vmRef: "Sustainalytics ESG Risk Ratings v3.1.1 - Second Dimension: Management; Calculating the ESG Risk Ratings"

  - id: 3
    title: "CDP and GRI in Peer Benchmarking"
    subtitle: "How CDP scores and GRI disclosures feed into peer analysis"
    icon: "📄"
    color: orange
    lessons:
      - id: "3.1"
        title: "CDP Scoring Methodology for Climate Benchmarking"
        duration: "35 min"
        vmRef: "CDP Scoring Methodology 2024"
      - id: "3.2"
        title: "GRI General Disclosures as a Benchmarking Baseline"
        duration: "30 min"
        vmRef: "GRI 2 General Disclosures 2021"

  - id: 4
    title: "ESG KPIs for Peer Benchmarking"
    subtitle: "The metrics consultants compare across companies"
    icon: "🔢"
    color: orange
    lessons:
      - id: "4.1"
        title: "Environmental KPIs: Carbon, Energy, Water and Waste"
        duration: "40 min"
        vmRef: "MSCI ESG Ratings Methodology Section 3.1 (Climate Change, Natural Capital, Pollution themes); Sustainalytics MEIs (Carbon, Water, Emissions)"
      - id: "4.2"
        title: "Social KPIs: Workforce, Safety and Supply Chain"
        duration: "40 min"
        vmRef: "MSCI ESG Ratings Methodology Section 3.1 (Human Capital, Product Liability themes); Sustainalytics MEIs (Human Capital, OHS, Human Rights)"
      - id: "4.3"
        title: "Governance KPIs: Board, Pay, Ethics and Tax"
        duration: "35 min"
        vmRef: "MSCI ESG Ratings Methodology Sections 3.4, 3.5 (Corporate Governance, Corporate Behavior); Sustainalytics Building Block 2"

  - id: 5
    title: "Running a Peer Benchmarking Engagement"
    subtitle: "From scoping to client presentation"
    icon: "💼"
    color: orange
    lessons:
      - id: "5.1"
        title: "Defining the Peer Group and Collecting Data"
        duration: "35 min"
        vmRef: "MSCI ESG Ratings Methodology Appendix 4 (ESG Rating Industries); Sustainalytics ESG Risk Ratings Methodology"
      - id: "5.2"
        title: "Synthesizing Findings and Presenting to Clients"
        duration: "35 min"
        vmRef: "MSCI ESG Ratings Methodology Appendix 5; GRI 2 General Disclosures 2021"
