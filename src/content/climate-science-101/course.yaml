id: climate-science-101
title: "Climate Science 101"
subtitle: "The physical science of climate change and why it matters"
description: "The foundational course for the entire platform. Covers the greenhouse effect, carbon cycle, evidence for human-caused climate change, greenhouse gases, climate impacts, tipping points, IPCC scenarios, and climate governance. Start here before any other course."
icon: "🌡️"
color: red
status: published
category: fundamentals
estimatedHours: 8
modules:
  - id: 0
    title: "How the Climate System Works"
    subtitle: "Energy Balance, Greenhouse Effect, and Feedbacks"
    icon: "☀️"
    color: red
    lessons:
      - id: "0.1"
        title: "Earth's Energy Balance"
        duration: "35 min"
        vmRef: "IPCC AR6 WGI, Chapter 7"
      - id: "0.2"
        title: "The Greenhouse Effect"
        duration: "40 min"
        vmRef: "IPCC AR6 WGI, Chapter 7.2"
      - id: "0.3"
        title: "The Carbon Cycle"
        duration: "45 min"
        vmRef: "IPCC AR6 WGI, Chapter 5"
      - id: "0.4"
        title: "Climate Feedbacks and Sensitivity"
        duration: "40 min"
        vmRef: "IPCC AR6 WGI, Chapter 7.4-7.5"

  - id: 1
    title: "The Evidence for Climate Change"
    subtitle: "What We Know and How We Know It"
    icon: "📈"
    color: orange
    lessons:
      - id: "1.1"
        title: "Temperature Records and Observed Warming"
        duration: "40 min"
        vmRef: "IPCC AR6 WGI, Chapter 2"
      - id: "1.2"
        title: "Paleoclimate: 800,000 Years of Evidence"
        duration: "35 min"
        vmRef: "IPCC AR6 WGI, Chapter 2.3"
      - id: "1.3"
        title: "Observed Changes: Ice, Oceans, and Extremes"
        duration: "40 min"
        vmRef: "IPCC AR6 WGI, Chapter 2.3, 9"
      - id: "1.4"
        title: "Attribution: How We Know It Is Human-Caused"
        duration: "35 min"
        vmRef: "IPCC AR6 WGI, Chapter 3"

  - id: 2
    title: "Greenhouse Gases in Detail"
    subtitle: "Sources, Sinks, and the Carbon Budget"
    icon: "🏭"
    color: teal
    lessons:
      - id: "2.1"
        title: "CO2: The Dominant Driver"
        duration: "40 min"
        vmRef: "IPCC AR6 WGI, Chapter 5.2; WGIII Chapter 2"
      - id: "2.2"
        title: "Methane, Nitrous Oxide, and F-Gases"
        duration: "40 min"
        vmRef: "IPCC AR6 WGI, Chapter 5.2; WGIII Chapter 2"
      - id: "2.3"
        title: "Global Emissions by Sector"
        duration: "35 min"
        vmRef: "IPCC AR6 WGIII, Chapter 2"
      - id: "2.4"
        title: "The Carbon Budget"
        duration: "45 min"
        vmRef: "IPCC AR6 WGI, Chapter 5.5; SPM"

  - id: 3
    title: "Climate Impacts and Risks"
    subtitle: "What Climate Change Means for People and Nature"
    icon: "⚠️"
    color: rose
    lessons:
      - id: "3.1"
        title: "Tipping Points and Irreversibility"
        duration: "45 min"
        vmRef: "IPCC AR6 WGI, Chapter 4.7; WGII Chapter 16"
      - id: "3.2"
        title: "Extreme Weather and Attribution"
        duration: "40 min"
        vmRef: "IPCC AR6 WGI, Chapter 11; WGII Chapter 16"
      - id: "3.3"
        title: "Regional Impacts"
        duration: "35 min"
        vmRef: "IPCC AR6 WGII, Chapters 9-15"
      - id: "3.4"
        title: "Human Dimensions: Food, Water, Health, Migration"
        duration: "40 min"
        vmRef: "IPCC AR6 WGII, Chapters 4-8"

  - id: 4
    title: "Scenarios and Pathways"
    subtitle: "Possible Climate Futures"
    icon: "🔮"
    color: blue
    lessons:
      - id: "4.1"
        title: "IPCC Scenarios: SSP1 to SSP5"
        duration: "45 min"
        vmRef: "IPCC AR6 WGI, Chapter 1.6; WGIII Chapter 3"
      - id: "4.2"
        title: "What 1.5C, 2C, 3C, and 4C Worlds Look Like"
        duration: "40 min"
        vmRef: "IPCC AR6 WGII, Chapter 16; SR1.5 Chapter 3"
      - id: "4.3"
        title: "Mitigation Pathways and Technology"
        duration: "40 min"
        vmRef: "IPCC AR6 WGIII, Chapter 3-4"
      - id: "4.4"
        title: "Adaptation: Living with Climate Change"
        duration: "35 min"
        vmRef: "IPCC AR6 WGII, Chapter 17"

  - id: 5
    title: "Climate Governance and the Policy Landscape"
    subtitle: "From Science to Action"
    icon: "🏛️"
    color: indigo
    lessons:
      - id: "5.1"
        title: "The UNFCCC and the Paris Agreement"
        duration: "40 min"
        vmRef: "Paris Agreement; UNFCCC"
      - id: "5.2"
        title: "The IPCC: How Climate Science Is Assessed"
        duration: "30 min"
        vmRef: "IPCC AR6 SPM"
      - id: "5.3"
        title: "National and Corporate Climate Action"
        duration: "35 min"
        vmRef: "Paris Agreement Art. 4; IPCC AR6 WGIII Chapter 14"
      - id: "5.4"
        title: "Connecting Climate Science to the Platform"
        duration: "25 min"
        vmRef: "Platform cross-reference"
