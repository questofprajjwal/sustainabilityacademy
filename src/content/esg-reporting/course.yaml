id: esg-reporting
title: "Sustainability / ESG Reporting in Practice"
subtitle: "The real-world playbook for producing an ESG or sustainability report"
description: "A practitioner-led course on how ESG and sustainability reporting actually gets done - from the first client call to the final designed PDF. Covers the end-to-end workflow, data collection, writing craft, stakeholder management, materiality, design, QA, and the hard-won lessons that textbooks don't teach. Built for newcomers entering the field and first-time consultants who need to know what to expect, what to ask, and what will go wrong."
icon: "📋"
color: emerald
status: published
category: esg
estimatedHours: 10
