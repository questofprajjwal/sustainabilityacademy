id: financed-emissions
title: "Financed Emissions"
subtitle: "Measuring and managing the carbon footprint of financial portfolios"
description: "A comprehensive course on financed emissions covering the PCAF Global GHG Accounting and Reporting Standard (3rd Edition, December 2025), attribution methods across all ten asset classes, facilitated and insurance-associated emissions, data quality frameworks, and regulatory disclosure requirements for financial institutions."
icon: "🏦"
color: teal
status: published
category: green-finance
estimatedHours: 20
modules:
  - id: 0
    title: "Introduction to Financed Emissions"
    subtitle: "Why financial institutions must account for portfolio carbon"
    icon: "🌍"
    color: teal
    lessons:
