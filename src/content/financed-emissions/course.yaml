      vmRef: "PCAF Standard Part A (3rd Ed.), Chapter 6; Annex 10.1"
    - id: "1.4"
      title: "Emission Factors & Data Sources"
      duration: "40 min"
      vmRef: "PCAF Standard Part A (3rd Ed.), Chapter 5 (Data Providers, Estimation Models)"

