      title: "What Are Financed Emissions?"
      duration: "40 min"
      vmRef: "PCAF Standard Part A (3rd Ed.), Chapter 1"
    - id: "0.2"
      title: "The GHG Protocol & Scope 3 Category 15"
      duration: "45 min"
      vmRef: "GHG Protocol Scope 3 Standard, Category 15; PCAF Part A Chapter 2"
    - id: "0.3"
      title: "The Business Case for Measuring Financed Emissions"
      duration: "35 min"
      vmRef: "PCAF Standard Part A (3rd Ed.), Chapters 2-3"
    - id: "0.4"
      title: "Key Frameworks & Standards Landscape"
      duration: "40 min"
      vmRef: "PCAF Standard Part A (3rd Ed.), Chapter 3; Part B Chapter 1; Part C Chapter 1"

  - id: 1
