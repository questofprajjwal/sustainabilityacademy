- question: "Which Scope 3 category covers emissions from the extraction, production, and transportation of ALL goods and services purchased by the company?"
  options:
    - "Category 2 — Capital Goods"
    - "Category 1 — Purchased Goods and Services"
    - "Category 3 — Fuel- and Energy-Related Activities"
    - "Category 4 — Upstream Transportation"
  answer: 1
  explanation: "Category 1 — Purchased Goods and Services covers the cradle-to-gate emissions of all goods and services the company buys and consumes in operations. Category 2 is specifically for capital goods (fixed assets)."

- question: "Category 15 — Investments is the principal Scope 3 category for which type of organisation?"
  options:
    - "Food manufacturers"
    - "Automotive companies"
    - "Financial institutions"
    - "Retail companies"
  answer: 2
  explanation: "Category 15 covers financed emissions — GHG emissions associated with loans, equity investments, bonds, and project finance. For financial institutions such as banks and asset managers, this category typically represents more than 99% of their total GHG footprint."

- question: "A company that sells products to a manufacturer who further processes them before sale to consumers would account for the processing emissions in which category?"
  options:
    - "Category 9 — Downstream Transportation"
    - "Category 10 — Processing of Sold Products"
    - "Category 11 — Use of Sold Products"
    - "Category 12 — End-of-Life Treatment"
  answer: 1
  explanation: "Category 10 — Processing of Sold Products covers emissions from downstream manufacturers who process the reporting company's sold intermediate products. Categories 11 and 12 cover consumer use and end-of-life disposal of final products."

- question: "Which of the following is an UPSTREAM Scope 3 category?"
  options:
    - "Category 9 — Downstream Transportation and Distribution"
    - "Category 11 — Use of Sold Products"
    - "Category 13 — Downstream Leased Assets"
    - "Category 5 — Waste Generated in Operations"
  answer: 3
  explanation: "Category 5 (Waste Generated in Operations) is an upstream category — it covers emissions from disposal of waste generated by the company's own operations. Categories 9, 11, and 13 are all downstream categories."
