id: ghg-scope-3
title: "Scope 3 GHG Calculations"
subtitle: "Measuring and managing value chain greenhouse gas emissions"
description: "A comprehensive course on Scope 3 GHG accounting under the GHG Protocol Corporate Value Chain Standard and its companion Technical Guidance. Covers the business case, accounting principles, all 15 upstream and downstream categories with calculation methods and worked examples, boundary-setting, data collection, allocation, target-setting, assurance, and reporting."
icon: "🔗"
color: violet
status: published
category: fundamentals
estimatedHours: 2
modules:
  - id: 0
    title: "Scope 3 Foundations"
    subtitle: "Why value chain emissions matter, the standard's framework, and accounting principles"
    icon: "📐"
    color: violet
    lessons:
      - id: "0.1"
        title: "Introduction to the Scope 3 Standard"
        duration: "30 min"
        vmRef: "Corporate-Value-Chain-Accounting-Reporing-Standard_041613_2.pdf, Chapter 1 (pp. 02-09)"
      - id: "0.2"
        title: "Business Goals for Scope 3 Accounting"
        duration: "30 min"
        vmRef: "Corporate-Value-Chain-Accounting-Reporing-Standard_041613_2.pdf, Chapter 2 (pp. 10-17)"
      - id: "0.3"
        title: "Steps, Requirements, and Accounting Principles"
        duration: "35 min"
        vmRef: "Corporate-Value-Chain-Accounting-Reporing-Standard_041613_2.pdf, Chapters 3-4 (pp. 18-25)"
      - id: "0.4"
        title: "Identifying Scope 3 Emissions: The 15 Categories"
        duration: "45 min"
        vmRef: "Corporate-Value-Chain-Accounting-Reporing-Standard_041613_2.pdf, Chapter 5 (pp. 26-57)"

