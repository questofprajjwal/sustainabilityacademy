- question: "What is the key difference between retiring and cancelling a VCU?"
  options:
  - "Retirement removes VCUs from the project's account; cancellation removes them from the buyer's account"
  - "Retirement permanently claims the credit against emissions (an offset); cancellation removes the credit from circulation without an offset claim"
  - "Retirement is free; cancellation requires a fee"
  - "Retirement is initiated by Verra; cancellation is initiated by the project proponent"
  answer: 1
  explanation: "Retirement = the credit is permanently consumed to offset a tonne of emissions (e.g., for a corporate net-zero claim). The retired status is publicly recorded on the Verra Registry. Cancellation = the credit is removed from circulation without making an offset claim — used when converting VCUs into another program's credits, or when Verra cancels credits following a reversal."

- question: "An AFOLU project deposited 10,000 buffer credits at its first verification (Year 5). At Year 10 (second verification), risk is unchanged. How many buffer credits are eligible for the '15% time release'?"
  options:
  - "1,500 (15% of original 10,000)"
  - "Calculated on all buffer credits including new deposits at Year 10 (15% of total accumulated)"
  - "None — releases only happen after the crediting period ends"
  - "All 10,000 if the project has perfect compliance"
  answer: 1
  explanation: "Per Section 5.2.3, the 15% time release applies to the total number of buffer credits associated with the project to date — i.e., the number previously held in the pool PLUS any newly deposited at the current verification event. So if 10,000 were held and 8,000 new ones deposited at Year 10, the release is 15% × 18,000 = 2,700 buffer credits converted back to VCUs."

- question: "Which VCU attribute specifically protects against double counting?"
  options:
  - "Additional"
  - "Durable"
  - "Traceable and not double counted"
  - "Robustly quantified"
  answer: 2
  explanation: "'Traceable and not double counted' is the specific attribute ensuring VCUs are uniquely identified via serial numbers in the Verra Registry and cannot be double-issued, double-claimed, or double-used. The other attributes address additionality (Additional), reversal risk (Durable), and measurement quality (Robustly quantified)."

- question: "If a project experiences a significant carbon loss event (e.g., a drought reverses SOC gains), what must the project proponent do?"
  options:
  - "Immediately retire an equivalent number of VCUs from their own account to compensate"
  - "Notify Verra via the Verra Project Hub within 30 days and submit a loss event report"
  - "Stop all further monitoring and wait for the next verification cycle"
  - "Purchase replacement VCUs from the secondary market within 90 days"
  answer: 1
  explanation: "Section 5.3.1 requires the project proponent to notify Verra within 30 days of discovering a loss event, and to prepare and submit a loss event report. Verra then puts an equivalent number of buffer credits on hold. The loss is ultimately covered by cancellation of buffer credits — not by the project proponent's own VCUs, unless the reversal was intentional."
