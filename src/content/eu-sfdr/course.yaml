id: eu-sfdr
title: "EU Sustainable Finance Disclosure Regulation (SFDR)"
subtitle: "Mastering sustainability disclosure obligations for financial market participants"
description: "A comprehensive course on the EU SFDR — the regulation requiring financial market participants and advisers to disclose how they integrate sustainability risks and impacts. Covers entity-level disclosures, product-level classifications (Article 6, 8, 9), PAI indicators, and regulatory technical standards."
icon: "🇪🇺"
color: blue
status: published
category: green-finance
estimatedHours: 16
modules:
  - id: 0
    title: "Introduction to SFDR"
    subtitle: "Origins, scope, and regulatory context"
    icon: "📋"
    color: blue
    lessons:
      - id: "0.1"
        title: "What is SFDR and Why It Matters"
        duration: "30 min"
        vmRef: "SFDR Regulation (EU) 2019/2088, Recitals 1-12"
      - id: "0.2"
        title: "Who Must Comply — Scope and Definitions"
        duration: "25 min"
        vmRef: "SFDR Art. 2, Art. 3"
      - id: "0.3"
        title: "Timeline and Implementation History"
        duration: "20 min"
        vmRef: "SFDR Art. 20; RTS 2022/1288"
      - id: "0.4"
        title: "The SFDR Ecosystem — Regulators and Key Players"
        duration: "25 min"
        vmRef: "SFDR Art. 14; ESMA Q&As"

  - id: 1
    title: "Entity-Level Disclosures"
    subtitle: "What firms must publish at the organisational level"
    icon: "🏢"
    color: teal
    lessons:
      - id: "1.1"
        title: "Sustainability Risk Policies (Article 3)"
        duration: "35 min"
        vmRef: "SFDR Art. 3; EC FAQ Q1-Q5"
      - id: "1.2"
        title: "Principal Adverse Impacts at Entity Level (Article 4)"
        duration: "40 min"
        vmRef: "SFDR Art. 4; RTS 2022/1288 Annex I"
      - id: "1.3"
        title: "Remuneration Policies (Article 5)"
        duration: "25 min"
        vmRef: "SFDR Art. 5; EC FAQ Q12-Q15"
      - id: "1.4"
        title: "Website Disclosure Requirements"
        duration: "35 min"
        vmRef: "SFDR Art. 3-5; ESMA Q&As Section I"

  - id: 2
    title: "Product-Level Classification"
    subtitle: "Article 6, 8, and 9 product categories"
    icon: "🏷️"
    color: violet
    lessons:
      - id: "2.1"
        title: "Article 6 — Mainstream Products"
        duration: "30 min"
        vmRef: "SFDR Art. 6; EC FAQ Q16-Q20"
      - id: "2.2"
        title: "Article 8 — Products Promoting E/S Characteristics"
        duration: "45 min"
        vmRef: "SFDR Art. 8; RTS 2022/1288 Annex II-III"
      - id: "2.3"
        title: "Article 9 — Sustainable Investment Products"
        duration: "45 min"
        vmRef: "SFDR Art. 9; RTS 2022/1288 Annex IV-V"
      - id: "2.4"
        title: "Reclassification and Boundary Cases"
        duration: "30 min"
        vmRef: "ESMA Q&As Section II; EC FAQ Q21-Q30"

  - id: 3
    title: "Principal Adverse Impacts (PAI)"
    subtitle: "Measuring and reporting negative sustainability effects"
    icon: "📊"
    color: orange
    lessons:
      - id: "3.1"
        title: "Understanding PAI — Concept and Mandatory Indicators"
        duration: "40 min"
        vmRef: "SFDR Art. 7; RTS 2022/1288 Annex I Table 1"
      - id: "3.2"
        title: "Environmental PAI Indicators — Calculation Methods"
        duration: "45 min"
        vmRef: "RTS 2022/1288 Annex I Tables 1-2"
      - id: "3.3"
        title: "Social and Governance PAI Indicators"
        duration: "40 min"
        vmRef: "RTS 2022/1288 Annex I Tables 3-4"
      - id: "3.4"
        title: "Optional PAI Indicators and Due Diligence"
        duration: "30 min"
        vmRef: "RTS 2022/1288 Annex I Table 2; Art. 4"
      - id: "3.5"
        title: "PAI Statement — Content, Format, and Timing"
        duration: "40 min"
        vmRef: "RTS 2022/1288 Art. 4-7; Annex I"

  - id: 4
    title: "Regulatory Technical Standards"
    subtitle: "Templates and detailed rules from the RTS"
    icon: "📑"
    color: indigo
    lessons:
      - id: "4.1"
        title: "Overview of the RTS Framework (2022/1288)"
        duration: "35 min"
        vmRef: "RTS 2022/1288 Art. 1-12"
      - id: "4.2"
        title: "Pre-Contractual Disclosures — Article 8 Templates"
        duration: "45 min"
        vmRef: "RTS 2022/1288 Art. 22-25; Annex II-III"
      - id: "4.3"
        title: "Pre-Contractual Disclosures — Article 9 Templates"
        duration: "45 min"
        vmRef: "RTS 2022/1288 Art. 26-29; Annex IV-V"
      - id: "4.4"
        title: "Periodic Reporting Requirements"
        duration: "40 min"
        vmRef: "RTS 2022/1288 Art. 50-60; Annex VI-IX"
      - id: "4.5"
        title: "EU Taxonomy Alignment Disclosures"
        duration: "40 min"
        vmRef: "RTS 2022/1288 Art. 50-51; EC FAQ Q35-Q42"

  - id: 5
    title: "Compliance and Supervisory Guidance"
    subtitle: "ESMA Q&As, EC clarifications, and practical application"
    icon: "⚖️"
    color: emerald
    lessons:
      - id: "5.1"
        title: "Key Clarifications from ESMA Q&As"
        duration: "40 min"
        vmRef: "ESMA Consolidated SFDR Q&As"
      - id: "5.2"
        title: "European Commission FAQ — Interpretive Guidance"
        duration: "35 min"
        vmRef: "EC SFDR FAQ April 2023"
      - id: "5.3"
        title: "Greenwashing Risks and Common Pitfalls"
        duration: "35 min"
        vmRef: "ESMA Q&As; EC FAQ; ESMA Greenwashing Report"
      - id: "5.4"
        title: "Building a SFDR Compliance Framework"
        duration: "40 min"
        vmRef: "RTS 2022/1288; ESMA Q&As"
