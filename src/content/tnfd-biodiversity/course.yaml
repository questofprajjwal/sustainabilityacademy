      title: "Biodiversity 101: Genes, Species & Ecosystems"
      duration: "40 min"
      vmRef: "IPBES Global Assessment 2019, Chapter 1"
    - id: "0.2"
      title: "The Five Drivers of Biodiversity Loss"
      duration: "45 min"
      vmRef: "IPBES Global Assessment 2019, Chapter 2.2"
    - id: "0.3"
      title: "Ecosystem Services & Natural Capital"
      duration: "45 min"
      vmRef: "IPBES Global Assessment 2019, Chapter 2.3"
    - id: "0.4"
      title: "The Business Case for Nature"
      duration: "40 min"
      vmRef: "TNFD Recommendations v1.0, Introduction"

  - id: 1
    title: "Introduction to TNFD"
    subtitle: "Origins, Structure & the LEAP Approach"
    icon: "📋"
    color: emerald
