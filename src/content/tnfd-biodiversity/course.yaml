id: tnfd-biodiversity
title: "TNFD & Biodiversity"
subtitle: "Nature-related risk assessment, disclosure, and the biodiversity crisis"
description: "A comprehensive course on the Taskforce on Nature-related Financial Disclosures (TNFD), biodiversity loss drivers, ecosystem services valuation, and corporate nature-related risk management."
icon: "🦋"
color: green
status: published
category: fundamentals
estimatedHours: 10
modules:
