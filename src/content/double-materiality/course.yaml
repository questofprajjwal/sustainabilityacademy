        title: "What is Double Materiality?"
        duration: "35 min"
        vmRef: "ESRS 1 Section 3; EFRAG IG1 Chapter 2"
      - id: "0.2"
        title: "The ESRS Architecture and Reporting Obligations"
        duration: "35 min"
        vmRef: "ESRS 1 Sections 1-2; EFRAG IG1 Introduction"

