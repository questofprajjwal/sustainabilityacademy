id: double-materiality
title: "Double Materiality"
subtitle: "How companies identify and report what matters under CSRD and ESRS"
description: "A practical course on the double materiality principle under the EU Corporate Sustainability Reporting Directive. Covers impact materiality, financial materiality, the IRO framework, the EFRAG four-step assessment process, stakeholder engagement, threshold-setting, value chain scope, and how to connect the assessment output to ESRS disclosures."
icon: "⚖️"
color: violet
status: published
category: esg
estimatedHours: 9
