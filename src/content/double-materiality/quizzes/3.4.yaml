- question: "EFRAG IG1 paragraph 99 states that following the materiality assessment, the undertaking shall report on the process and outcome based on three specific disclosure requirements. Which three are these?"
  options:
    - "ESRS 2 GOV-1, ESRS 2 SBM-1, and ESRS 2 MDR-A"
    - "ESRS 2 IRO-1, ESRS 2 SBM-3, and ESRS 2 IRO-2"
    - "ESRS 2 MDR-P, ESRS 2 MDR-A, and ESRS 2 MDR-T"
    - "ESRS 1 AR16, ESRS 2 IRO-1, and ESRS 2 GOV-2"
  answer: 1
  explanation: "EFRAG IG1 paragraph 99 states the undertaking shall report based on: (a) ESRS 2 IRO-1 Description of the processes to identify and assess material impacts, risks and opportunities; (b) ESRS 2 SBM-3 Material impacts, risks and opportunities and their interaction with strategy and business model; and (c) ESRS 2 IRO-2 Disclosure requirements in ESRS covered by the undertaking's sustainability statement."

- question: "ESRS 1 paragraph 115 requires the undertaking to structure its sustainability statement in four parts. What are those four parts, in the required order?"
  options:
    - "Strategy, Governance, Metrics and Targets, Policies and Actions"
    - "General information, Environmental information, Social information, Governance information"
    - "Impact assessment, Risk assessment, Opportunity assessment, Reporting"
    - "Climate, Biodiversity, Social, Anti-corruption"
  answer: 1
  explanation: "ESRS 1 paragraph 115 states the undertaking shall structure its sustainability statement in four parts in the following order: general information, environmental information (including disclosures pursuant to Article 8 of the Taxonomy Regulation), social information, and governance information."

- question: "Under ESRS 1, what is the difference between how explicit and implicit omissions are handled when the undertaking concludes a datapoint is not material?"
  options:
    - "Both types of omission require an explicit written statement that the item is not material"
    - "For datapoints derived from other EU legislation listed in ESRS 2 Appendix B, the undertaking must explicitly state the datapoint is 'not material'; for other datapoints, the undertaking may simply omit them without such an explicit statement"
    - "Explicit omissions apply only to governance matters; implicit omissions apply only to environmental matters"
    - "There is no distinction; all omissions are treated the same way under ESRS 1"
  answer: 1
  explanation: "ESRS 1 paragraph 35 states that if the undertaking omits information derived from other EU legislation listed in ESRS 2 Appendix B, it shall explicitly state that the information is 'not material'. ESRS 1 paragraph 34(b) allows omitting other datapoints assessed as not material without an explicit statement."
