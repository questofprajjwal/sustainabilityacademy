id: eu-taxonomy
title: "EU Taxonomy"
subtitle: "The classification system that defines what counts as green in Europe"
description: "A practical course on the EU Taxonomy - the classification system that defines which economic activities qualify as environmentally sustainable. Covers the six environmental objectives, eligibility vs. alignment, technical screening criteria, DNSH, minimum safeguards, KPI disclosure, and how the taxonomy connects to CSRD, SFDR, and the EU Green Bond Standard."
icon: "🌿"
color: emerald
status: published
category: green-finance
estimatedHours: 3
modules:
  - id: 0
    title: "What Is the EU Taxonomy?"
    subtitle: "The problem it solves, how it works, and who it applies to"
    icon: "🧭"
    color: emerald
    lessons:
      - id: "0.1"
        title: "Why the EU Built a Green Dictionary"
        duration: "12 min"
        vmRef: "Regulation (EU) 2020/852, Recitals 1-16, Art. 1"
      - id: "0.2"
        title: "The Six Environmental Objectives"
        duration: "12 min"
        vmRef: "Regulation (EU) 2020/852, Art. 9"
      - id: "0.3"
        title: "Who Must Report and What They Disclose"
        duration: "15 min"
        vmRef: "Regulation (EU) 2020/852, Art. 8; Disclosures Delegated Act (EU) 2021/2178"

  - id: 1
    title: "Eligibility, Alignment & the Four Tests"
    subtitle: "The difference between being listed and being green"
    icon: "✅"
    color: blue
    lessons:
      - id: "1.1"
        title: "Taxonomy-Eligible vs. Taxonomy-Aligned"
        duration: "12 min"
        vmRef: "Regulation (EU) 2020/852, Art. 3; Disclosures Delegated Act"
      - id: "1.2"
        title: "Substantial Contribution and Technical Screening Criteria"
        duration: "15 min"
        vmRef: "Regulation (EU) 2020/852, Art. 10-16; Climate Delegated Act (EU) 2021/2139"
      - id: "1.3"
        title: "Do No Significant Harm (DNSH)"
        duration: "12 min"
        vmRef: "Regulation (EU) 2020/852, Art. 17"
      - id: "1.4"
        title: "Minimum Safeguards"
        duration: "10 min"
        vmRef: "Regulation (EU) 2020/852, Art. 18"

  - id: 2
    title: "The Delegated Acts"
    subtitle: "Where the actual criteria live"
    icon: "📋"
    color: orange
    lessons:
      - id: "2.1"
        title: "The Climate Delegated Act"
        duration: "15 min"
        vmRef: "Climate Delegated Act (EU) 2021/2139; Complementary CDA (EU) 2022/1214"
      - id: "2.2"
        title: "The Environmental Delegated Act"
        duration: "12 min"
        vmRef: "Environmental Delegated Act (EU) 2023/2486"
      - id: "2.3"
        title: "Reading Technical Screening Criteria - A Walkthrough"
        duration: "15 min"
        vmRef: "Climate Delegated Act Annexes I-II"

  - id: 3
    title: "KPI Disclosure & Reporting"
    subtitle: "Turnover, CapEx, OpEx - and what they mean"
    icon: "📊"
    color: violet
    lessons:
      - id: "3.1"
        title: "The Three KPIs for Non-Financial Companies"
        duration: "15 min"
        vmRef: "Disclosures Delegated Act (EU) 2021/2178, Art. 8; Annexes I-II"
      - id: "3.2"
        title: "KPIs for Financial Institutions"
        duration: "12 min"
        vmRef: "Disclosures Delegated Act (EU) 2021/2178, Annexes III-XI"
      - id: "3.3"
        title: "Reporting in Practice - Templates, Pitfalls, and Tips"
        duration: "15 min"
        vmRef: "Disclosures Delegated Act Annexes; EC FAQ"

  - id: 4
    title: "Taxonomy in the Bigger Picture"
    subtitle: "How it connects to CSRD, SFDR, and the EU Green Bond Standard"
    icon: "🔗"
    color: indigo
    lessons:
      - id: "4.1"
        title: "Taxonomy and CSRD"
        duration: "12 min"
        vmRef: "CSRD Directive (EU) 2022/2464; ESRS E1-E5"
      - id: "4.2"
        title: "Taxonomy and SFDR"
        duration: "12 min"
        vmRef: "Regulation (EU) 2020/852, Art. 5-7; SFDR (EU) 2019/2088"
      - id: "4.3"
        title: "Taxonomy and the EU Green Bond Standard"
        duration: "10 min"
        vmRef: "EuGBS Regulation (EU) 2023/2631"
      - id: "4.4"
        title: "Common Misconceptions and What Comes Next"
        duration: "12 min"
        vmRef: "EC Taxonomy FAQ; Platform on Sustainable Finance recommendations"
