- question: "When were the UN Guiding Principles on Business and Human Rights (UNGPs) endorsed by the UN Human Rights Council?"
  options:
  - "2003"
  - "2008"
  - "2011"
  - "2015"
  answer: 2
  explanation: "The UNGPs were unanimously endorsed by the UN Human Rights Council on 16 June 2011. They were developed by Professor John Ruggie, the UN Special Representative, after six years of consultation. The 2008 'Protect, Respect and Remedy' framework preceded the 2011 operationalising Guiding Principles."

- question: "Under the UNGPs, which Pillar establishes the independent responsibility of business enterprises to avoid infringing on human rights?"
  options:
  - "Pillar I: The State Duty to Protect"
  - "Pillar II: The Corporate Responsibility to Respect"
  - "Pillar III: Access to Remedy"
  - "Pillar IV: The Business Duty to Report"
  answer: 1
  explanation: "Pillar II (Principles 11-24) defines the corporate responsibility to respect human rights. This responsibility exists independently of whether the state has fulfilled its Pillar I duties. It requires businesses to have a policy commitment, a human rights due diligence process, and processes to enable remediation."

- question: "According to the UNGPs, which of the following is NOT one of the effectiveness criteria that non-judicial grievance mechanisms should meet (UNGP Principle 31)?"
  options:
  - "Legitimate"
  - "Accessible"
  - "Profitable"
  - "Transparent"
  answer: 2
  explanation: "Principle 31 sets out eight effectiveness criteria for non-judicial grievance mechanisms: legitimate, accessible, predictable, equitable, transparent, rights-compatible, a source of continuous learning, and (for operational mechanisms) based on engagement and dialogue. 'Profitable' is not among them."
